<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYNQ Home</title>

<style>
:root{
  --accent:#6366f1;
  --bg:#060607;
  --text:#f1f2f8;
  --muted:#8f94a3;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* background setup */
.bg{
  position:absolute;
  inset:0;
  overflow:hidden;
  /* De gevraagde afbeelding */
  background-image: url('https://i.ytimg.com/vi/FlzJ5FQXBj8/maxresdefault.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Overlay voor leesbaarheid en effecten */
.bg::before{
  content:"";
  position:absolute;
  inset:0;
  /* Donkere overlay zodat tekst goed leesbaar blijft */
  background: rgba(6, 6, 7, 0.4); 
  /* Subtiel rasterpatroon */
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
}

/* Vignette (donkere randen) */
.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.7));
}

/* Glow blobs die over de afbeelding zweven */
.blob{
  position:absolute;
  width:500px;
  height:500px;
  background:var(--accent);
  filter:blur(150px);
  opacity:.12; /* Iets lager gezet zodat de bg zichtbaar blijft */
  border-radius:50%;
  animation:float 14s ease-in-out infinite;
  z-index: 1;
}

.b1{top:-150px; left:-100px}
.b2{
  bottom:-200px;
  right:-150px;
  background:#a5b4fc;
  animation-delay:5s;
}

@keyframes float{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(30px) scale(1.1)}
}

/* main content */
.wrap{
  position:relative;
  text-align:center;
  max-width:520px;
  padding:40px;
  z-index: 10; /* Zorg dat tekst boven de blobs staat */
}

/* logo */
.logo{
  font-size:82px;
  font-weight:900;
  letter-spacing:-4px;
  background:linear-gradient(90deg,var(--accent),#a5b4fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:0;
  filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
}

/* subtitle */
.sub{
  color:var(--text);
  font-size:18px;
  margin-top:10px;
  font-weight: 300;
  letter-spacing: 1px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

/* footer pill */
.pill{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 18px;
  border-radius:999px;
  background:rgba(10, 10, 11, 0.8);
  border:1px solid rgba(99,102,241,.3);
  color:var(--accent);
  font-size:12px;
  font-family:monospace;
  backdrop-filter: blur(5px);
  z-index: 10;
}
</style>
</head>

<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
</div>

<div class="wrap">
  <h1 class="logo">ZYNQ</h1>
  <div class="sub">Play. Chat. Connect.</div>
</div>

<div class="pill">v1.0</div>

</body>
</html>
