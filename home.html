<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNQ Home | Soft Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
    :root {
        --accent: #818cf8;
        --accent-soft: #c7d2fe;
        --bg: #08080a;
        --text: #eef2ff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* ACHTERGROND - ZACHTER GEMAAKT */
    .bg {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background-image: url('https://i.ytimg.com/vi/FlzJ5FQXBj8/maxresdefault.jpg');
        background-size: cover;
        background-position: center;
        filter: brightness(0.25) blur(4px); /* Blur toegevoegd voor zachtheid */
        transform: scale(1.1); /* Scale om witte randen door blur te voorkomen */
        z-index: -2;
    }

    /* Overlay met fijnere korrel */
    .bg-overlay {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, rgba(8, 8, 10, 0.4), var(--bg) 90%);
        z-index: -1;
    }

    /* Zachte Glow Blobs */
    .blob {
        position: absolute;
        width: 800px;
        height: 800px;
        background: var(--accent);
        filter: blur(180px);
        opacity: 0.12;
        border-radius: 50%;
        animation: float 25s ease-in-out infinite;
        z-index: -1;
    }

    .b1 { top: -300px; left: -200px; opacity: 0.1; }
    .b2 { bottom: -300px; right: -200px; background: var(--accent-soft); animation-delay: -7s; }

    @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(40px, 60px); }
    }

    /* CONTENT */
    .wrap {
        position: relative;
        text-align: center;
        z-index: 10;
    }

    .logo {
        font-size: 92px;
        font-weight: 600; /* Minder zwaar dan 800 */
        letter-spacing: -2px;
        line-height: 1;
        background: linear-gradient(to bottom, #ffffff, #d1d5db);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
        /* Zachte schaduw in plaats van felle glow */
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
    }

    .sub {
        color: #94a3b8;
        font-size: 16px;
        margin-top: 20px;
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;
    }

    /* MINIMALISTISCHE PILL */
    .pill {
        position: fixed;
        bottom: 40px;
        padding: 6px 16px;
        border-radius: 100px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.3);
        font-size: 10px;
        letter-spacing: 2px;
        backdrop-filter: blur(5px);
    }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="bg-overlay"></div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>

    <div class="wrap">
        <h1 class="logo">ZYNQ</h1>
        <div class="sub">Play • Chat • Connect</div>
    </div>

    <div class="pill">V1.0.0</div>

</body>
</html>
