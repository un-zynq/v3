<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYNQ Home</title>

<style>
:root{
  --accent:#6366f1;
  --bg:#060607;
  --text:#f1f2f8;
  --muted:#8f94a3;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* background */
.bg{
  position:absolute;
  inset:0;
  overflow:hidden;
}

/* grid pattern */
.bg::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size:40px 40px;
}

/* vignette (dark edges) */
.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6));
}

/* glow blobs */
.blob{
  position:absolute;
  width:420px;
  height:420px;
  background:var(--accent);
  filter:blur(140px);
  opacity:.15;
  border-radius:50%;
  animation:float 14s ease-in-out infinite;
}

.b1{top:-120px;left:-120px}
.b2{
  bottom:-160px;
  right:-140px;
  background:#a5b4fc;
  animation-delay:5s;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(25px)}
}

/* main */
.wrap{
  position:relative;
  text-align:center;
  max-width:520px;
  padding:40px;
}

/* logo */
.logo{
  font-size:72px;
  font-weight:900;
  letter-spacing:-4px;
  background:linear-gradient(90deg,var(--accent),#a5b4fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:0;
}

/* subtitle */
.sub{
  color:var(--muted);
  font-size:16px;
  margin-top:12px;
}

/* footer pill */
.pill{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 14px;
  border-radius:999px;
  background:#0a0a0b;
  border:1px solid rgba(99,102,241,.25);
  color:var(--accent);
  font-size:12px;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
</div>

<div class="wrap">
  <div class="logo">ZYNQ</div>
  <div class="sub">Play. Chat. Connect.</div>
</div>

<div class="pill">v1.0</div>

</body>
</html>
