<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNQ Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    
    <style>
    :root {
        --accent: #6366f1;
        --bg: #060607;
        --text: #f1f2f8;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* ACHTERGROND - SCHERP */
    .bg {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background-image: url('https://i.ytimg.com/vi/FlzJ5FQXBj8/maxresdefault.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: -2;
    }

    /* Overlay met rasterpatroon */
    .bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(6, 6, 9, 0.45);
        background-image: 
            linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    /* Vignette effect */
    .bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.85));
    }

    /* Glow Blobs */
    .blob {
        position: absolute;
        width: 700px;
        height: 700px;
        background: var(--accent);
        filter: blur(160px);
        opacity: 0.07;
        border-radius: 50%;
        animation: float 20s ease-in-out infinite;
        z-index: -1;
    }

    .b1 { top: -200px; left: -100px; }
    .b2 { bottom: -200px; right: -150px; background: #a5b4fc; animation-delay: -5s; }

    @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(30px, 40px); }
    }

    /* CONTENT */
    .wrap {
        position: relative;
        text-align: center;
        z-index: 10;
    }

    /* LOGO MET HALF OPACITY */
    .logo {
        font-size: 110px;
        font-weight: 800;
        letter-spacing: -5px;
        line-height: 1;
        color: #ffffff;
        opacity: 0.67; /* 67 ;) */
        margin: 0;
        filter: drop-shadow(0 10px 30px rgba(0,0,0,0.4));
        user-select: none;
    }

    /* PILL */
    .pill {
        position: fixed;
        bottom: 30px;
        padding: 8px 18px;
        border-radius: 100px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.3);
        font-size: 10px;
        font-family: monospace;
        letter-spacing: 2px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }
    </style>
</head>
<body>

    <div class="bg">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
    </div>

    <div class="wrap">
        <h1 class="logo">ZYNQ</h1>
    </div>

    <div class="pill">V1.0</div>

</body>
</html>
