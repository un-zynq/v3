<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNQ Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
    :root {
        --accent: #6366f1;
        --accent-light: #a5b4fc;
        --bg: #060607;
        --text: #f1f2f8;
        --muted: #8f94a3;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* BACKGROUND SYSTEM */
    .bg {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background-image: url('https://i.ytimg.com/vi/FlzJ5FQXBj8/maxresdefault.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: -2;
    }

    /* Donkere overlay voor leesbaarheid + Raster */
    .bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(6, 6, 9, 0.45);
        background-image: 
            linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 50px 50px;
    }

    /* Vignette effect */
    .bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.85));
    }

    /* Glow blobs */
    .blob {
        position: absolute;
        width: 600px;
        height: 600px;
        background: var(--accent);
        filter: blur(160px);
        opacity: 0.15;
        border-radius: 50%;
        animation: float 18s ease-in-out infinite;
        z-index: -1;
    }

    .b1 { top: -200px; left: -100px; }
    .b2 { 
        bottom: -250px; 
        right: -150px; 
        background: var(--accent-light); 
        animation-delay: -5s; 
    }

    @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* CONTENT WRAPPER */
    .wrap {
        position: relative;
        text-align: center;
        max-width: 600px;
        padding: 40px;
        z-index: 10;
    }

    /* LOGO */
    .logo {
        font-size: 100px;
        font-weight: 800;
        letter-spacing: -5px;
        line-height: 1;
        background: linear-gradient(to bottom, #fff 30%, var(--accent-light));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
        filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.4));
        animation: text-glow 4s ease-in-out infinite;
    }

    @keyframes text-glow {
        0%, 100% { filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.3)); }
        50% { filter: drop-shadow(0 0 50px rgba(99, 102, 241, 0.6)); }
    }

    /* SUBTITLE */
    .sub {
        color: var(--text);
        font-size: 20px;
        margin-top: 15px;
        font-weight: 300;
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0.8;
        text-shadow: 0 4px 15px rgba(0,0,0,0.8);
    }

    /* FOOTER PILL */
    .pill {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 20px;
        border-radius: 100px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--accent-light);
        font-size: 11px;
        font-weight: 600;
        font-family: monospace;
        letter-spacing: 2px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        z-index: 10;
    }
    </style>
</head>
<body>

    <div class="bg">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
    </div>

    <div class="wrap">
        <h1 class="logo">ZYNQ</h1>
        <div class="sub">Play. Chat. Connect.</div>
    </div>

    <div class="pill">VERSION 1.0</div>

</body>
</html>
