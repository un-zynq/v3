<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>ZYNQ v3</title>
    <style>
        :root {
            --accent: #6366f1;
            --bg: #060607;
            --sidebar: #141417;
            --panel: #1c1d21;
            --text: #f1f2f8;
            --muted: #8f94a3;
            --btn-size: 60px;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }
        .sidebar {
            width: var(--btn-size);
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid rgba(255,255,255,.06);
            position: relative;
        }
        #indicator {
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 30px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
            transition: transform .35s cubic-bezier(.4,0,.2,1);
            pointer-events: none;
            z-index: 10;
            margin-top: 15px;
        }
        .icon-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            position: relative;
        }
        .icon-btn.active {
            color: var(--accent);
        }
        .content {
            flex: 1;
            position: relative;
            background: var(--panel);
        }
        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: none;
            background: var(--panel);
        }
        iframe.active {
            display: block;
        }
    </style>
</head>
<body>
    
    <div class="sidebar">
        <div id="indicator"></div>

        <div class="icon-btn active" onclick="sw('home', this, 0)">
            <i data-lucide="home"></i>
        </div>
        <div class="icon-btn" onclick="sw('games', this, 1)">
            <i data-lucide="gamepad-2"></i>
        </div>
        <div class="icon-btn" onclick="sw('music', this, 2)">
            <i data-lucide="music"></i>
        </div>
        <div class="icon-btn" onclick="sw('links', this, 3)">
            <i data-lucide="link"></i>
        </div>
        <div class="icon-btn" onclick="sw('settings', this, 4)">
            <i data-lucide="settings"></i>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        function sw(tabId, clickedElement, indicatorIndex) {
            // Activeer de juiste iframe
            document.querySelectorAll("iframe").forEach(frame => {
                frame.classList.toggle("active", frame.id === tabId);
            });

            // Activeer de juiste knop in de sidebar
            document.querySelectorAll(".icon-btn").forEach(btn => {
                btn.classList.remove("active");
            });
            clickedElement.classList.add("active");

            // Verplaats de indicator
            document.getElementById("indicator").style.transform = `translateY(${indicatorIndex * 60}px)`;
        }

        // Lucide icons initialiseren
        window.addEventListener("load", function () {
            if (window.lucide) {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
