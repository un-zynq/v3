<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ZYNQ Chat</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"><script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.2/index.min.js"></script><script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script><style>:root{--bg-obsidian:#050506;--bg-sidebar:#0B0B0C;--bg-chat:#0F0F10;--bg-input:#161618;--accent:#5865F2;--success:#23A559;--text-main:#EDEDED;--text-muted:#9A9A9E;--border:rgba(255,255,255,0.06);--radius:14px}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-obsidian);color:var(--text-main);display:flex;height:100vh;overflow:hidden}.sidebar-scroll::-webkit-scrollbar,#chat::-webkit-scrollbar{width:5px;height:5px}.sidebar-scroll::-webkit-scrollbar-thumb,#chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:10px}.sidebar-scroll::-webkit-scrollbar-thumb:hover,#chat::-webkit-scrollbar-thumb:hover{background:var(--accent)}#sidebar{width:300px;background:var(--bg-sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border);transition:width .35s cubic-bezier(.32,.72,0,1);position:relative;z-index:10001}#sidebar.collapsed{width:72px}.profile-card{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}.profile-header{display:flex;align-items:center;gap:12px;cursor:pointer}#profileAvatarContainer{width:46px;height:46px;border-radius:50%;overflow:hidden;background:#1F1F22;border:3px solid var(--border);transition:all .2s cubic-bezier(.4,0,.2,1);flex-shrink:0}#profileAvatarContainer:hover{border-color:var(--accent);transform:scale(1.06)}#profileAvatarImg,#profileAvatarPlaceholder{width:100%;height:100%;object-fit:cover;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),#7289da);color:#fff;font-size:24px;font-weight:700}#profileDisplay{font-weight:700;font-size:16.5px;letter-spacing:-.02em}.sidebar-scroll{flex:1;overflow-y:auto;padding:12px 8px 12px 14px}.label{font-size:10px;text-transform:uppercase;font-weight:800;color:var(--text-muted);margin:22px 10px 8px;letter-spacing:.08em}.add-area button { width: 100%; margin-top: 10px; padding: 14px 16px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), #6f7cff); color: #fff; font-weight: 700; font-size: 14.5px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: all 0.25s cubic-bezier(.23,1,.32,1); box-shadow: 0 8px 20px rgba(88, 101, 242, 0.25); } .add-area button:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 28px rgba(88, 101, 242, 0.35); filter: brightness(1.05); } .add-area button:active { transform: scale(0.98); box-shadow: 0 4px 12px rgba(88, 101, 242, 0.25); }#chatTitle { margin-right: 12px; }.add-area button i { width: 18px; height: 18px; }#friendsList{display:grid;gap:4px}.friend-row{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;cursor:pointer;transition:all .25s cubic-bezier(.23,1,.32,1)}.friend-row:hover{background:rgba(255,255,255,.035)}.friend-row.active{background:rgba(88,101,242,.12);transform:scale(1.02)}.avatar-wrapper{position:relative;width:42px;height:42px;flex-shrink:0}.avatar-wrapper img,.avatar-wrapper .placeholder{width:100%;height:100%;border-radius:50%;object-fit:cover;background:var(--accent);color:#fff;font-size:21px;display:flex;align-items:center;justify-content:center;font-weight:700}.avatar-ring{position:absolute;inset:-3px;border:3px solid transparent;border-radius:50%;pointer-events:none;transition:border-color .3s ease}.avatar-ring.online{border-color:var(--success)}.avatar-ring.offline{border-color:#666}.unread-badge{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px var(--bg-sidebar);animation:pulse 2s infinite}.friend-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}.rename-btn{opacity:0;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:8px;transition:all .2s}.friend-row:hover .rename-btn{opacity:1}.add-area{padding:18px 18px 22px;border-top:1px solid var(--border)}#friendIdInput{width:100%;background:var(--bg-input);border:1px solid var(--border);color:#fff;padding:14px 16px;border-radius:12px;font-size:15px;outline:none;margin-bottom:8px;transition:border-color .2s}#friendIdInput:focus{border-color:var(--accent)}#main{flex:1;display:flex;flex-direction:column;background:var(--bg-chat);position:relative}#top{height:64px;padding:0 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:16px}.top-left{display:flex;align-items:center;gap:14px;flex:1}#chatHeaderAvatarWrapper{width:36px;height:36px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0;transition:transform .2s cubic-bezier(.4,0,.2,1)}#chatHeaderAvatarWrapper:hover{transform:scale(1.08)}.chat-header-info b{font-size:16.5px;font-weight:600}.chat-header-info span{font-size:12.5px;color:var(--text-muted)}#chat{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}.welcome-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;color:var(--text-muted);animation:fadeIn 0.6s ease forwards}.welcome-panel h1{font-size:36px;font-weight:700;color:var(--text-main);letter-spacing:-.03em}.msg{max-width:72%;padding:12px 16px;border-radius:18px;background:rgba(255,255,255,.06);position:relative;transition:all .2s cubic-bezier(.4,0,.2,1);animation:msgPop .25s cubic-bezier(.4,0,.2,1) forwards}.msg:hover{transform:translateY(-1px);background:rgba(255,255,255,.09)}.msg.other{align-self:flex-start;border-bottom-left-radius:4px;display:flex;gap:12px}.msg.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}.msg-avatar-small{width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 3px var(--bg-chat);transition:transform .2s}.msg-content{flex:1;min-width:0}.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;font-size:13px}.msg-author{font-weight:700}.msg-id{font-family:JetBrains Mono;font-size:11px;opacity:.6}.msg-text{word-break:break-word;line-height:1.42;font-size:15px}.msg-footer{display:flex;gap:8px;font-size:10.5px;opacity:.75;margin-top:5px;justify-content:flex-end}.msg.other .msg-footer{justify-content:flex-start}#bottom{padding:0 24px 22px;flex-shrink:0;display:block}.input-bar{background:var(--bg-input);border-radius:16px;display:flex;align-items:center;padding:6px 20px;border:1px solid var(--border);min-height:58px;transition:all .25s cubic-bezier(.4,0,.2,1)}.input-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,101,242,.15)}input#message{background:transparent;border:none;color:#fff;flex:1;padding:14px 8px;outline:none;font-size:15.5px}.modal{display:none;position:fixed;inset:0;background:rgba(5,5,6,.97);z-index:99999;align-items:center;justify-content:center}.modal-content{background:var(--bg-sidebar);border-radius:20px;width:100%;max-width:440px;padding:36px 32px;box-shadow:0 25px 50px rgba(0,0,0,.45);animation:modalPop .3s cubic-bezier(.4,0,.2,1)}.dropdown{display:none;position:absolute;right:24px;top:62px;background:#111113;border:1px solid var(--border);border-radius:12px;width:190px;padding:6px;z-index:10002;box-shadow:0 15px 30px rgba(0,0,0,.35);animation:dropdownPop .2s cubic-bezier(.4,0,.2,1)}.dropdown button{width:100%;text-align:left;background:none;border:none;color:#fff;padding:12px 14px;cursor:pointer;border-radius:8px;font-size:14px;display:flex;align-items:center;gap:10px;transition:all .2s}.dropdown button:hover{background:rgba(255,255,255,.08)}@media(max-width:768px){#sidebar{position:fixed;inset:0 auto 0 0;width:280px;transform:translateX(-100%);box-shadow:8px 0 30px rgba(0,0,0,.5);z-index:10001}#sidebar.open{transform:translateX(0)}#burgerBtn{display:flex!important}}#burgerBtn{display:none;background:none;border:none;color:var(--text-muted);padding:8px;cursor:pointer}.avatar-wrapper img,.avatar-ring,#profileAvatarContainer,#chatHeaderAvatarWrapper .avatar-wrapper,.settings-avatar-container,.msg-avatar-small{border-radius:50%!important}@keyframes msgPop{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}@keyframes modalPop{0%{opacity:0;transform:scale(0.95)}100%{opacity:1;transform:scale(1)}}@keyframes dropdownPop{0%{opacity:0;transform:translateY(-8px)}100%{opacity:1;transform:translateY(0)}}</style></head><body><input type="file" id="avatarUploadInput" accept="image/*" style="display:none"><div id="setupModal" class="modal"><div class="modal-content"><h2 style="font-size:26px;margin-bottom:8px">👋 Welkom bij ZYNQ Chat</h2><p style="color:var(--text-muted);margin-bottom:20px">Alles lokaal • End-to-end encrypted • Ultra stabiel</p><p style="margin-bottom:8px">Je ID wordt: <span i  d="setupIdPreview" style="font-family:JetBrains Mono;font-weight:700;color:var(--accent)"></span></p><input id="setupName" type="text" placeholder="Display naam" value="New User" style="width:100%;background:var(--bg-input);border:1px solid var(--border);color:#fff;padding:14px;border-radius:12px;font-size:15px;margin:16px 0"><div style="display:flex;gap:10px"><button onclick="closeSetupModal()" style="flex:1;padding:14px;border-radius:12px;background:transparent;border:1px solid var(--border);color:var(--text-main);font-weight:600">Annuleren</button><button onclick="createAccount()" style="flex:1;padding:14px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-weight:700">Account aanmaken</button></div></div></div><div id="accountSettingsModal" class="modal"><div class="modal-content"><h2>⚙️ Account</h2><div style="text-align:center;margin:28px 0"><div id="settingsAvatarContainer" style="width:118px;height:118px;border-radius:50%;margin:0 auto 16px;overflow:hidden;border:4px solid var(--accent);background:#222;transition:transform .3s cubic-bezier(.4,0,.2,1)"></div><div style="display:flex;gap:10px;justify-content:center"><button onclick="triggerAvatarUpload()" style="background:var(--accent);color:#fff;border:none;padding:11px 24px;border-radius:12px;cursor:pointer;font-weight:700">Upload foto</button><button onclick="removeAvatar()" style="background:transparent;border:1px solid var(--border);color:var(--text-main);padding:11px 24px;border-radius:12px;cursor:pointer;font-weight:700">Verwijder</button></div></div><div style="display:grid;gap:20px"><div><label style="display:block;font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:6px">DISPLAY NAME</label><input id="settingsNameInput" type="text" style="width:100%;background:var(--bg-input);border:1px solid var(--border);color:#fff;padding:14px;border-radius:12px"></div><div><label style="display:block;font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:6px">PERMANENTE ID</label><div style="background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px"><span id="settingsIdDisplay" style="font-family:JetBrains Mono;flex:1;word-break:break-all"></span><button onclick="copyId()" style="background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:8px;font-weight:700">Kopiëren</button></div></div></div><div style="display:flex;gap:10px;margin-top:32px"><button onclick="closeAccountSettings()" style="flex:1;padding:14px;border-radius:12px;background:transparent;border:1px solid var(--border);color:var(--text-main);font-weight:600">Annuleren</button><button onclick="saveAccountSettings()" style="flex:1;padding:14px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-weight:700">Opslaan</button></div></div></div><div id="editAliasModal" class="modal"><div class="modal-content"><h2 id="editAliasTitle">Alias wijzigen</h2><p id="editAliasSubtitle" style="color:var(--text-muted);margin:10px 0 18px"></p><input id="editAliasInput" type="text" placeholder="Alleen zichtbaar voor jou" style="width:100%;background:var(--bg-input);border:1px solid var(--border);color:#fff;padding:14px;border-radius:12px"><div style="display:flex;gap:10px;margin-top:28px"><button onclick="closeEditAliasModal()" style="flex:1;padding:14px;border-radius:12px;background:transparent;border:1px solid var(--border)">Annuleren</button><button onclick="saveFriendAlias()" style="flex:1;padding:14px;border-radius:12px;background:var(--accent);color:#fff;border:none">Opslaan</button></div></div></div><div id="sleepOverlay" style="display:none;position:fixed;inset:0;background:rgba(5,5,6,.98);z-index:100000;align-items:center;justify-content:center;flex-direction:column;color:#fff;text-align:center;gap:16px"><h2 style="font-size:30px;color:var(--success)">✅ Slaapstand</h2><p>Een andere tab heeft deze ZYNQ ID overgenomen.<br>Dit tabblad staat nu in slaapstand.</p><button onclick="location.reload()" style="background:var(--accent);color:#fff;border:none;padding:14px 32px;border-radius:12px;font-weight:700;cursor:pointer">Herladen</button></div><div id="sidebarOverlay" onclick="toggleSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999"></div><div id="sidebar"><button onclick="toggleSidebar()" id="sidebarCloseBtn" style="display:none;position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);color:#fff;border:none;width:40px;height:40px;border-radius:50%;z-index:10002;cursor:pointer;align-items:center;justify-content:center;font-size:22px">✕</button><div class="profile-card"><div class="profile-header" onclick="openAccountSettings()"><div id="profileAvatarContainer"><img id="profileAvatarImg" src="" alt="" style="display:none"><div id="profileAvatarPlaceholder">👤</div></div><div id="profileDisplay">New User</div></div></div><div class="sidebar-scroll"><div class="label">VRIENDEN</div><div id="friendsList"></div></div><div class="add-area"><input id="friendIdInput" placeholder="Voeg vriend toe via ID" onkeypress="if(event.key==='Enter')addFriend()"><button onclick="addFriend()"><i data-lucide="user-plus"></i> Vriend toevoegen</button></div></div><div id="main"><div id="top"><button onclick="toggleSidebar()" id="burgerBtn"><i data-lucide="menu" style="width:24px;height:24px"></i></button><div class="top-left"><div id="chatHeaderAvatarWrapper" class="avatar-wrapper"></div><div class="chat-header-info"><b id="chatTitle"># Welkom</b><span id="chatStatus">Selecteer een vriend</span></div></div><button onclick="toggleMenu()" style="background:none;border:none;color:var(--text-muted);padding:8px;cursor:pointer"><i data-lucide="more-horizontal" style="width:22px;height:22px"></i></button></div><div id="chat"></div><div id="bottom"><div id="inputWrapper" class="input-bar"><input id="message" type="text" placeholder="Bericht..." onkeypress="if(event.key==='Enter')sendMessage()"><button onclick="sendMessage()" style="background:none;border:none;color:var(--accent);padding:8px;cursor:pointer"><i data-lucide="send" style="width:24px;height:24px"></i></button></div></div></div><div id="dropdown" class="dropdown"><button onclick="clearView()" style="color:var(--accent)"><i data-lucide="x"></i> Chat sluiten</button></div><script>let peer=null,current=null,channel=new BroadcastChannel('zynq-obsidian-pro');let pingInterval=null,isConnecting=false,takeoverRetries=0,isSleeping=false;let currentEditingFriend=null,pendingAvatarUpdate=null,statusMap={};let lastChatId=null,reconnectAttempts=0,reconnectTimeout=null,flushInterval=null;const MAX_RECONNECT_ATTEMPTS=15;let db=JSON.parse(localStorage.getItem('zynq_elite'))||{friends:{},profile:{name:'New User',myId:null,avatar:null}};if(db.friends&&typeof db.friends==='object'){let migrated=false;Object.keys(db.friends).forEach(id=>{const f=db.friends[id];if(f&&typeof f==='object'){if(f.name!==undefined&&f.remoteName===undefined){f.remoteName=f.name;migrated=true}if(f.customName===undefined){f.customName=null;migrated=true}if(f.remoteAvatar===undefined){f.remoteAvatar=null;migrated=true}if(f.unread===undefined){f.unread=0;migrated=true}if(f.name!==undefined)delete f.name}});if(migrated)save()}function save(){localStorage.setItem('zynq_elite',JSON.stringify(db))}function getFriendDisplayName(id){if(!db.friends[id])return id;const f=db.friends[id];return f.customName||f.remoteName||id}function updateProfileUI(){document.getElementById('profileDisplay').textContent=db.profile.name||'New User';updateProfileAvatar()}function updateProfileAvatar(){const img=document.getElementById('profileAvatarImg');const ph=document.getElementById('profileAvatarPlaceholder');if(db.profile.avatar){img.src=db.profile.avatar;img.style.display='block';ph.style.display='none'}else{img.style.display='none';ph.style.display='flex'}}function copyId(){if(isSleeping||!db.profile.myId)return;navigator.clipboard.writeText(db.profile.myId).then(()=>{const el=document.getElementById('settingsIdDisplay');if(el){const original=el.innerText;el.innerText="GEKOPIEERD!";setTimeout(()=>{el.innerText=original},1400)}})}function setupBroadcastChannel(){channel.onmessage=event=>{if(isSleeping)return;const msg=event.data;if(msg.type==='DESTROY_PEER'&&msg.id===db.profile.myId)enterSleepMode()}}function enterSleepMode(){isSleeping=true;if(peer){peer.destroy();peer=null}if(pingInterval){clearInterval(pingInterval);pingInterval=null}if(flushInterval){clearInterval(flushInterval);flushInterval=null}document.getElementById('sleepOverlay').style.display='flex';document.getElementById('sidebar').style.opacity='0.3';document.getElementById('main').style.pointerEvents='none';document.getElementById('inputWrapper').classList.add('disabled')}function wakeUp(){if(!isSleeping)return;isSleeping=false;document.getElementById('sleepOverlay').style.display='none';document.getElementById('sidebar').style.opacity='1';document.getElementById('main').style.pointerEvents='auto';document.getElementById('inputWrapper').classList.remove('disabled');initPeer()}function setupStorageListener(){window.addEventListener('storage',event=>{if(event.key==='zynq_elite'&&event.newValue){db=JSON.parse(event.newValue);updateProfileUI();renderFriends();updateChatHeader()}})}function showSetupModal(){const modal=document.getElementById('setupModal');const preview=document.getElementById('setupIdPreview');if(!db.profile.myId){const tempId=Array.from({length:2},()=>Math.random().toString(36).substring(2,5).toUpperCase()).join('-');preview.textContent=tempId}else preview.textContent=db.profile.myId;document.getElementById('setupName').value=db.profile.name||'New User';modal.style.display='flex'}function closeSetupModal(){document.getElementById('setupModal').style.display='none'}function createAccount(){const nameInput=document.getElementById('setupName').value.trim();if(!nameInput)return;db.profile.name=nameInput;if(!db.profile.myId)db.profile.myId=Array.from({length:2},()=>Math.random().toString(36).substring(2,5).toUpperCase()).join('-');save();closeSetupModal();updateProfileUI();initPeer()}function forceDestroyOtherTabs(){channel.postMessage({type:'DESTROY_PEER',id:db.profile.myId});setTimeout(()=>channel.postMessage({type:'DESTROY_PEER',id:db.profile.myId}),40);setTimeout(()=>channel.postMessage({type:'DESTROY_PEER',id:db.profile.myId}),90)}function formatTime(ts){if(!ts)return'--:--';const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}function migrateDb(){let changed=false;Object.keys(db.friends).forEach(id=>{const f=db.friends[id];if(!f.messages||!Array.isArray(f.messages))return;f.messages=f.messages.map((m,idx)=>{if(typeof m==='string'){changed=true;return{id:`legacy-${Date.now()}-${idx}`,from:'other',text:m,timestamp:Date.now()-(f.messages.length-idx)*60000,readAcked:true}}if(!m.id){changed=true;m.id=`msg-${Date.now()}-${Math.random().toString(36).substring(2)}`;m.timestamp=m.timestamp||Date.now();if(m.from==='me'&&!m.status)m.status='read'}if(m.from!=='me'&&m.readAcked===undefined){m.readAcked=true;changed=true}return m});});if(changed)save()}function flushPending(id){if(!peer||!db.friends[id]||statusMap[id]!=='online')return;const f=db.friends[id];let needsSave=false;f.messages.forEach(m=>{if(m.from==='me'&&(m.status==='pending'||m.status==='sent')){peer.send(id,{type:'MESSAGE',id:m.id,text:m.text,timestamp:m.timestamp});if(m.status==='pending'){m.status='sent';needsSave=true}}});if(needsSave){save();if(current===id)renderMessages()}}function flushPendingForAll(){Object.keys(db.friends).forEach(id=>{if(statusMap[id]==='online')flushPending(id)})}function doPingCycle(){if(isSleeping)return;Object.keys(db.friends).forEach(id=>{if(peer)peer.send(id,{type:"PING"})});setTimeout(()=>{Object.keys(db.friends).forEach(id=>{statusMap[id]=onlineSet.has(id)?'online':'offline'});renderFriends();flushPendingForAll()},500)}let onlineSet=new Set();function scheduleReconnect(delay=3000){if(reconnectTimeout)clearTimeout(reconnectTimeout);if(isSleeping||reconnectAttempts>=MAX_RECONNECT_ATTEMPTS)return;reconnectTimeout=setTimeout(()=>{reconnectAttempts++;if(peer){peer.destroy();peer=null}initPeer(0)},delay)}function initPeer(retry=0){if(isSleeping||!db.profile.myId)return;if(isConnecting)return;isConnecting=true;takeoverRetries=retry;forceDestroyOtherTabs();setTimeout(()=>{if(peer){peer.destroy();peer=null}peer=new ZYNQ.Peer({txt:true,id:db.profile.myId});peer.on('ready',id=>{isConnecting=false;takeoverRetries=0;reconnectAttempts=0;if(reconnectTimeout){clearTimeout(reconnectTimeout);reconnectTimeout=null}doPingCycle();flushPendingForAll();if(flushInterval)clearInterval(flushInterval);flushInterval=setInterval(flushPendingForAll,6000);if(pingInterval)clearInterval(pingInterval);pingInterval=setInterval(doPingCycle,1200);renderFriends();updateChatHeader()});peer.on('error',err=>{const isIdTaken=err.type==='unavailable-id'||(err.message&&err.message.toLowerCase().includes('id'));if(isIdTaken&&retry<120){forceDestroyOtherTabs();setTimeout(()=>{isConnecting=false;initPeer(retry+1)},130);return}isConnecting=false;if(reconnectAttempts<MAX_RECONNECT_ATTEMPTS){const backoff=1800*Math.pow(1.6,reconnectAttempts);scheduleReconnect(backoff)}});peer.on('message',({from,data})=>{if(isSleeping)return;if(typeof data==='object'&&data.type==="PING"){return peer.send(from,{type:"PONG",name:db.profile.name,avatar:db.profile.avatar||null})}if(typeof data==='object'&&data.type==="PONG"){onlineSet.add(from);statusMap[from]='online';if(!db.friends[from])addFriendDirect(from);db.friends[from].remoteName=data.name||from;if(data.avatar!==undefined)db.friends[from].remoteAvatar=data.avatar;flushPending(from);renderFriends();return}if(data.type==="MESSAGE"){if(!db.friends[from])addFriendDirect(from);const f=db.friends[from];const already=f.messages.some(m=>m.id===data.id);if(!already){const newMsg={id:data.id,from:from,text:data.text,timestamp:data.timestamp||Date.now()};f.messages.push(newMsg);if(current!==from)f.unread=(f.unread||0)+1;save();if(current===from)renderMessages();else renderFriends()}if(peer)peer.send(from,{type:'DELIVERED',msgId:data.id});return}if(data.type==="DELIVERED"){const f=db.friends[from];if(f){const msg=f.messages.find(m=>m.from==='me'&&m.id===data.msgId);if(msg&&msg.status!=='delivered'&&msg.status!=='read'){msg.status='delivered';save();if(current===from)renderMessages()}}return}if(typeof data==='string'||(!data.type&&data)){if(!db.friends[from])addFriendDirect(from);const f=db.friends[from];const legacyId=`legacy-recv-${Date.now()}`;const newMsg={id:legacyId,from:from,text:typeof data==='string'?data:data.text||JSON.stringify(data),timestamp:Date.now()};f.messages.push(newMsg);if(current!==from)f.unread=(f.unread||0)+1;save();if(current===from)renderMessages();else renderFriends();if(peer)peer.send(from,{type:'DELIVERED',msgId:legacyId})}});renderFriends()},180)}function applySidebarState(){const sidebar=document.getElementById('sidebar');const overlay=document.getElementById('sidebarOverlay');const isMobile=window.innerWidth<769;if(isMobile){sidebar.classList.remove('collapsed')}else{if(db.sidebarCollapsed)sidebar.classList.add('collapsed');else sidebar.classList.remove('collapsed')}}function init(){setupBroadcastChannel();setupStorageListener();updateProfileUI();migrateDb();applySidebarState();window.addEventListener('resize',applySidebarState);document.getElementById('bottom').style.display=current!==null?'block':'none';if(!db.profile.myId||db.profile.name==='New User'){showSetupModal();return}initPeer();setTimeout(()=>{lucide.createIcons()},80);window.addEventListener('beforeunload',()=>{if(peer)peer.destroy();if(pingInterval)clearInterval(pingInterval);if(flushInterval)clearInterval(flushInterval)})}function openAccountSettings(){if(isSleeping)return;pendingAvatarUpdate=db.profile.avatar;document.getElementById('settingsNameInput').value=db.profile.name||'New User';document.getElementById('settingsIdDisplay').textContent=db.profile.myId||'—';const fileInput=document.getElementById('avatarUploadInput');if(fileInput&&!fileInput.hasAttribute('data-listener')){fileInput.setAttribute('data-listener','true');fileInput.addEventListener('change',handleAvatarFileSelect)}updateSettingsAvatarPreview();document.getElementById('accountSettingsModal').style.display='flex'}function triggerAvatarUpload(){document.getElementById('avatarUploadInput').click()}function updateSettingsAvatarPreview(){const container=document.getElementById('settingsAvatarContainer');if(pendingAvatarUpdate){container.innerHTML=`<img src="${pendingAvatarUpdate}" style="width:100%;height:100%;object-fit:cover;">`}else{container.innerHTML=`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#222;color:#fff;font-size:58px;">👤</div>`}}function handleAvatarFileSelect(e){const file=e.target.files[0];if(!file||!file.type.startsWith('image/'))return;const reader=new FileReader();reader.onload=function(ev){const img=new Image();img.onload=function(){const canvas=document.createElement('canvas');let w=img.width,h=img.height;const max=256;if(w>h){if(w>max){h=Math.round(h*(max/w));w=max}}else{if(h>max){w=Math.round(w*(max/h));h=max}}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);pendingAvatarUpdate=canvas.toDataURL('image/jpeg',0.82);updateSettingsAvatarPreview()};img.src=ev.target.result};reader.readAsDataURL(file)}function removeAvatar(){pendingAvatarUpdate=null;updateSettingsAvatarPreview()}function saveAccountSettings(){db.profile.name=document.getElementById('settingsNameInput').value.trim()||'New User';db.profile.avatar=pendingAvatarUpdate;save();updateProfileUI();closeAccountSettings();renderFriends()}function closeAccountSettings(){document.getElementById('accountSettingsModal').style.display='none';pendingAvatarUpdate=null}function editFriendAlias(id){if(isSleeping)return;currentEditingFriend=id;const f=db.friends[id];document.getElementById('editAliasInput').value=f.customName||f.remoteName||id;document.getElementById('editAliasTitle').textContent=`Alias voor ${id}`;document.getElementById('editAliasSubtitle').innerHTML=`Remote naam: <strong>${f.remoteName||id}</strong>`;document.getElementById('editAliasModal').style.display='flex'}function saveFriendAlias(){if(!currentEditingFriend)return;db.friends[currentEditingFriend].customName=document.getElementById('editAliasInput').value.trim()||null;save();closeEditAliasModal();renderFriends()}function closeEditAliasModal(){document.getElementById('editAliasModal').style.display='none';currentEditingFriend=null}function addFriend(){if(isSleeping)return;const id=document.getElementById('friendIdInput').value.trim().toUpperCase();if(id&&id!==(peer?peer.id:null)){addFriendDirect(id);document.getElementById('friendIdInput').value=''}}function addFriendDirect(id){if(!db.friends[id]){db.friends[id]={messages:[],remoteName:id,customName:null,remoteAvatar:null,unread:0};save();if(peer)peer.send(id,{type:"PING"});renderFriends()}}function selectChat(id){if(isSleeping)return;current=id;if(db.friends[id])db.friends[id].unread=0;save();renderFriends();renderMessages();if(window.innerWidth<769){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').style.display='none'}}function sendMessage(){if(isSleeping||!current)return;const input=document.getElementById('message');const txt=input.value.trim();if(!txt)return;const msgId=`msg-${Date.now()}-${Math.random().toString(36).substring(2,9)}`;const newMsg={id:msgId,from:'me',text:txt,timestamp:Date.now(),status:'pending'};db.friends[current].messages.push(newMsg);save();renderMessages();input.value='';if(peer&&statusMap[current]==='online'){peer.send(current,{type:'MESSAGE',id:msgId,text:txt,timestamp:newMsg.timestamp});newMsg.status='sent';save();renderMessages()}else{flushPending(current)}}function toggleSidebar(){const sidebar=document.getElementById('sidebar');const overlay=document.getElementById('sidebarOverlay');const isMobile=window.innerWidth<769;if(isMobile){sidebar.classList.toggle('open');overlay.style.display=sidebar.classList.contains('open')?'block':'none'}else{sidebar.classList.toggle('collapsed');db.sidebarCollapsed=sidebar.classList.contains('collapsed');save()}lucide.createIcons()}function toggleMenu(){if(isSleeping)return;const m=document.getElementById('dropdown');m.style.display=m.style.display==='block'?'none':'block'}function renderFriends(){if(isSleeping)return;const list=document.getElementById('friendsList');list.innerHTML='';Object.keys(db.friends).forEach(id=>{const f=db.friends[id];const display=getFriendDisplayName(id);const status=statusMap[id]||'offline';const unread=f.unread||0;let avatarHTML=f.remoteAvatar?`<img src="${f.remoteAvatar}" alt="">`:`<div class="placeholder">👤</div>`;const div=document.createElement('div');div.className=`friend-row ${id===current?'active':''}`;div.innerHTML=`<div class="avatar-wrapper"><div class="avatar-ring ${status}"></div>${avatarHTML}${unread>0?`<span class="unread-badge">${unread}</span>`:''}</div><span class="friend-name">${display}</span><button class="rename-btn" onclick="event.stopImmediatePropagation();editFriendAlias('${id}')" title="Alias wijzigen"><i data-lucide="edit-3" style="width:18px;height:18px"></i></button>`;div.onclick=()=>selectChat(id);list.appendChild(div)});updateChatHeader();lucide.createIcons()}function updateChatHeader(){const wrapper=document.getElementById('chatHeaderAvatarWrapper');if(!current||!db.friends[current]){wrapper.style.display='none';document.getElementById('chatTitle').textContent='# Welkom';document.getElementById('chatStatus').textContent='Selecteer een vriend';return}wrapper.style.display='';const f=db.friends[current];const status=statusMap[current]||'offline';let avatarHTML=f.remoteAvatar?`<img src="${f.remoteAvatar}" alt="" style="width:100%;height:100%;object-fit:cover;">`:`<div class="placeholder" style="font-size:21px">👤</div>`;wrapper.innerHTML=`<div class="avatar-ring ${status}"></div>${avatarHTML}`;document.getElementById('chatTitle').textContent=getFriendDisplayName(current);document.getElementById('chatStatus').textContent=current}function renderMessages(){if(isSleeping)return;const chatBox=document.getElementById('chat');const isNewChat=current!==lastChatId;lastChatId=current;if(!current||!db.friends[current]){chatBox.innerHTML=`<div class="welcome-panel"><h1>ZYNQ</h1><p>Ultra-minimal • Volledig lokaal • E2E encrypted • 100% stabiel</p></div>`;return}const tolerance=90;let wasAtBottom=false;if(!isNewChat&&chatBox.scrollHeight>50){wasAtBottom=(chatBox.scrollHeight-chatBox.scrollTop-chatBox.clientHeight)<=tolerance}const f=db.friends[current];const existingMessages=Array.from(chatBox.children).map(el=>el.dataset.msgId).filter(Boolean);const newMessages=f.messages.filter(m=>!existingMessages.includes(m.id));if(newMessages.length===f.messages.length||isNewChat){chatBox.innerHTML='';f.messages.forEach(m=>{const div=document.createElement('div');const isMe=m.from==='me';div.className=`msg ${isMe?'me':'other'}`;div.dataset.msgId=m.id;div.innerHTML=isMe?`<div class="msg-content"><div class="msg-header"><span class="msg-author">${db.profile.name}</span><span class="msg-id">(${db.profile.myId||'me'})</span></div><span class="msg-text">${m.text}</span><div class="msg-footer"><span>${formatTime(m.timestamp)}</span></div></div>`:`<div class="msg-avatar-small">${f.remoteAvatar?`<img src="${f.remoteAvatar}" style="width:100%;height:100%;object-fit:cover;">`:'👤'}</div><div class="msg-content"><div class="msg-header"><span class="msg-author">${getFriendDisplayName(current)}</span><span class="msg-id">(${current})</span></div><span class="msg-text">${m.text}</span><div class="msg-footer"><span>${formatTime(m.timestamp)}</span></div></div>`;chatBox.appendChild(div)})}else{newMessages.forEach(m=>{const div=document.createElement('div');const isMe=m.from==='me';div.className=`msg ${isMe?'me':'other'}`;div.dataset.msgId=m.id;div.innerHTML=isMe?`<div class="msg-content"><div class="msg-header"><span class="msg-author">${db.profile.name}</span><span class="msg-id">(${db.profile.myId||'me'})</span></div><span class="msg-text">${m.text}</span><div class="msg-footer"><span>${formatTime(m.timestamp)}</span></div></div>`:`<div class="msg-avatar-small">${f.remoteAvatar?`<img src="${f.remoteAvatar}" style="width:100%;height:100%;object-fit:cover;">`:'👤'}</div><div class="msg-content"><div class="msg-header"><span class="msg-author">${getFriendDisplayName(current)}</span><span class="msg-id">(${current})</span></div><span class="msg-text">${m.text}</span><div class="msg-footer"><span>${formatTime(m.timestamp)}</span></div></div>`;chatBox.appendChild(div)})}if(isNewChat||wasAtBottom){chatBox.scrollTop=chatBox.scrollHeight}lucide.createIcons()}function clearView(){if(isSleeping)return;current=null;renderFriends();renderMessages()}window.addEventListener('keydown',e=>{if(isSleeping)return;if(e.key==='Escape'){clearView();document.getElementById('dropdown').style.display='none'}});window.onclick=e=>{if(!e.target.closest('button[onclick="toggleMenu()"]'))document.getElementById('dropdown').style.display='none'};window.onload=init;</script></body></html>
