<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>ZYNQ v3</title>
    <style>
        :root {
            --accent: #6366f1;
            --bg: #060607;
            --sidebar: #141417;
            --panel: #1c1d21;
            --text: #f1f2f8;
            --muted: #8f94a3;
            --btn-size: 60px;
            --notification: #22c55e;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }
        .sidebar {
            width: var(--btn-size);
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid rgba(255,255,255,.06);
            position: relative;
        }
        #indicator {
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 30px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
            transition: transform .35s cubic-bezier(.4,0,.2,1);
            pointer-events: none;
            z-index: 10;
            margin-top: 15px;
        }
        .icon-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            position: relative;
        }
        .icon-btn.active {
            color: var(--accent);
        }
        .badge {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 10px;
            height: 10px;
            background: var(--notification);
            border-radius: 50%;
            border: 2px solid var(--sidebar);
            display: none;
        }
        .badge.visible {
            display: block;
        }
        .content {
            flex: 1;
            position: relative;
            background: var(--panel);
        }
        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: none;
            background: var(--panel);
        }
        iframe.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="indicator"></div>
        <div class="icon-btn active" onclick="sw('home',this,0)">
            <i data-lucide="home"></i>
        </div>
        <div class="icon-btn" onclick="sw('games',this,1)">
            <i data-lucide="gamepad-2"></i>
        </div>
        <div id="chat-nav" class="icon-btn" onclick="sw('chat',this,2)">
            <i data-lucide="message-circle"></i>
            <div id="chat-badge" class="badge"></div>
        </div>
        <div class="icon-btn" onclick="sw('links',this,3)">
            <i data-lucide="link"></i>
        </div>
        <div class="icon-btn" onclick="sw('settings',this,4)">
            <i data-lucide="settings"></i>
        </div>
    </div>
    <div class="content">
        <iframe id="home" class="active" src="home.html"></iframe>
        <iframe id="games" src="games.html"></iframe>
        <iframe id="chat" src="chat.html"></iframe>
        <iframe id="links" src="links.html"></iframe>
        <iframe id="settings" src="settings.html"></iframe>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        let activeTab = "home";
        const badgeElement = document.getElementById("chat-badge");

        function setBadge(visible) {
            badgeElement.classList.toggle("visible", visible);
            localStorage.setItem("zynq_unread", visible ? "1" : "0");
        }

        // Herstel badge uit localStorage bij start
        if (localStorage.getItem("zynq_unread") === "1") {
            setBadge(true);
        }

        function sw(tabId, clickedElement, indicatorIndex) {
            activeTab = tabId;

            // Activeer de juiste iframe
            document.querySelectorAll("iframe").forEach(frame => {
                frame.classList.toggle("active", frame.id === tabId);
            });

            // Activeer de juiste knop in de sidebar
            document.querySelectorAll(".icon-btn").forEach(btn => {
                btn.classList.remove("active");
            });
            clickedElement.classList.add("active");

            // Verplaats de indicator
            document.getElementById("indicator").style.transform = `translateY(${indicatorIndex * 60}px)`;

            // Stuur altijd de tab-status naar de chat iframe (ook als we switchen weg van chat)
            const chatIframe = document.getElementById("chat");
            if (chatIframe && chatIframe.contentWindow) {
                const isChatActive = (tabId === "chat");
                chatIframe.contentWindow.postMessage({
                    type: "zynq_tab_status",
                    active: isChatActive
                }, "*");
            }

            // Badge reset alleen als we naar de chat tab gaan
            if (tabId === "chat") {
                setBadge(false);
            }
        }

        // Luister naar berichten van de chat iframe
        window.addEventListener("message", function (event) {
            const data = event.data;
            if (!data || typeof data !== "object") {
                return;
            }

            if (data.type === "zynq_state") {
                // Badge logica blijft hetzelfde (parent toont badge als er unread is)
                if (activeTab !== "chat") {
                    setBadge(!!data.hasUnread);
                } else if (!data.hasUnread) {
                    setBadge(false);
                }
            }

            if (data.type === "zynq_message") {
                if (data.subType === "received" && activeTab !== "chat") {
                    setBadge(true);
                }
                if (data.subType === "read") {
                    setBadge(false);
                }
            }
        });

        // Lucide icons initialiseren
        window.addEventListener("load", function () {
            if (window.lucide) {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
