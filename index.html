<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ZYNQ v3</title>

<style>
:root{
  --accent:#6366f1;
  --bg:#060607;
  --sidebar:#141417;
  --panel:#1c1d21;
  --text:#f1f2f8;
  --muted:#8f94a3;
  --btn-size: 60px;
  --notification: #22c55e; /* Groene kleur voor de dot */
}

body{
  margin:0;
  height:100vh;
  display:flex;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  overflow: hidden;
}

/* SIDEBAR */
.sidebar{
  width: var(--btn-size);
  background:var(--sidebar);
  display:flex;
  flex-direction:column;
  align-items:center;
  border-right:1px solid rgba(255,255,255,.06);
  position: relative;
}

/* DE SLIDING INDICATOR */
#indicator {
  position: absolute;
  left: 0;
  top: 0;
  width: 3px;
  height: 30px; 
  background: var(--accent);
  border-radius: 0 4px 4px 0;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  z-index: 10;
  margin-top: 15px; 
}

/* ICONS */
.icon-btn{
  width: var(--btn-size);
  height: var(--btn-size);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color: var(--muted);
  z-index: 5;
  transition: color 0.2s;
  position: relative; /* Nodig om de dot te positioneren */
}

.icon-btn:hover{
  color: var(--text);
}

.icon-btn.active{
  color: var(--accent);
}

.icon-btn svg{
  width:22px;
  height:22px;
}

/* DE GROENE DOT */
.badge {
  position: absolute;
  top: 18px;    /* Iets naar beneden vanaf de bovenkant van de knop */
  right: 18px;  /* Iets naar binnen vanaf de rechterkant */
  width: 10px;
  height: 10px;
  background-color: var(--notification);
  border-radius: 50%;
  border: 2px solid var(--sidebar); /* Geeft een mooie rand zodat hij loskomt van het icoon */
  display: none; /* Standaard verborgen */
}

.badge.visible {
  display: block;
}

/* CONTENT */
.content{
  flex:1;
  position:relative;
  background:var(--panel);
}

iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  display: none;
  background:var(--panel);
}

iframe.active{
  display: block;
}
</style>
</head>

<body>

<div class="sidebar">
  <div id="indicator"></div>

  <div class="icon-btn active" onclick="sw('home', this, 0)"><i data-lucide="home"></i></div>
  <div class="icon-btn" onclick="sw('games', this, 1)"><i data-lucide="gamepad-2"></i></div>
  
  <div id="chat-nav" class="icon-btn" onclick="sw('chat', this, 2)">
    <i data-lucide="message-circle"></i>
    <div id="chat-badge" class="badge"></div>
  </div>

  <div class="icon-btn" onclick="sw('links', this, 3)"><i data-lucide="link"></i></div>
  <div class="icon-btn" onclick="sw('settings', this, 4)"><i data-lucide="settings"></i></div>
</div>

<div class="content">
  <iframe id="home" class="active" src="home.html"></iframe>
  <iframe id="games" src="games.html"></iframe>
  <iframe id="chat" src="chat.html"></iframe>
  <iframe id="links" src="links.html"></iframe>
  <iframe id="settings" src="settings.html"></iframe>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
lucide.createIcons();

function sw(id, el, index){
  document.querySelectorAll("iframe").forEach(f => {
    f.classList.toggle("active", f.id === id);
  });

  document.querySelectorAll(".icon-btn").forEach(b => {
    b.classList.remove("active");
  });
  el.classList.add("active");

  const indicator = document.getElementById('indicator');
  indicator.style.transform = `translateY(${index * 60}px)`;
}

// === LUISTEREN NAAR UNREAD EVENT VANUIT IFRAME ===
// === CHAT VISIBILITY + UNREAD CONTROL ===
(function () {
  let hasUnread = false;

  const chatIframe = document.getElementById('chat');
  const badge = document.getElementById('chat-badge');

  function isChatActive() {
    return chatIframe.classList.contains('active');
  }

  function updateBadge() {
    // alleen tonen als er unread is EN chat niet open is
    if (hasUnread && !isChatActive()) {
      badge.classList.add('visible');
    } else {
      badge.classList.remove('visible');
    }
  }

  // luister naar unread events vanuit chat iframe
  window.addEventListener('message', function (event) {
    if (event.data && event.data.type === 'zynq_unread') {
      hasUnread = event.data.hasUnread;
      updateBadge();
    }
  });

  // override je sw functie zodat we weten wanneer user switcht
  const originalSw = window.sw;
  window.sw = function (id, el, index) {
    if (originalSw) originalSw(id, el, index);

    // zodra je naar chat gaat → badge meteen weg (want je leest ze nu)
    if (id === 'chat') {
      badge.classList.remove('visible');
    }

    updateBadge();
  };

})();
</script>

</body>
</html>
