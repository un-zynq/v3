<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ZYNQ v3</title>

<style>
:root{
  --accent:#6366f1;
  --bg:#060607;
  --sidebar:#141417;
  --panel:#1c1d21;
  --text:#f1f2f8;
  --muted:#8f94a3;
  --btn-size: 60px;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  overflow: hidden;
}

/* SIDEBAR */
.sidebar{
  width: var(--btn-size);
  background:var(--sidebar);
  display:flex;
  flex-direction:column;
  align-items:center;
  border-right:1px solid rgba(255,255,255,.06);
  position: relative;
}

/* DE SLIDING INDICATOR */
#indicator {
  position: absolute;
  left: 0;
  top: 0;
  width: 3px;
  height: 30px; /* Hoogte van het balkje */
  background: var(--accent);
  border-radius: 0 4px 4px 0;
  /* De slide animatie */
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  z-index: 10;
  /* Verticaal centreren binnen de eerste knop (60px knop - 30px balk = 30px over / 2 = 15px) */
  margin-top: 15px; 
}

/* ICONS */
.icon-btn{
  width: var(--btn-size);
  height: var(--btn-size);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color: var(--muted);
  z-index: 5;
  transition: color 0.2s;
}

.icon-btn:hover{
  color: var(--text);
}

.icon-btn.active{
  color: var(--accent);
}

.icon-btn svg{
  width:22px;
  height:22px;
}

/* CONTENT */
.content{
  flex:1;
  position:relative;
  background:var(--panel);
}

/* IFRAME SYSTEM (GEEN FADE) */
iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  display: none; /* Direct verbergen */
  background:var(--panel);
}

iframe.active{
  display: block; /* Direct tonen */
}
</style>
</head>

<body>

<div class="sidebar">
  <div id="indicator"></div>

  <div class="icon-btn active" onclick="sw('home', this, 0)"><i data-lucide="home"></i></div>
  <div class="icon-btn" onclick="sw('games', this, 1)"><i data-lucide="gamepad-2"></i></div>
  <div class="icon-btn" onclick="sw('chat', this, 2)"><i data-lucide="message-circle"></i></div>
  <div class="icon-btn" onclick="sw('links', this, 3)"><i data-lucide="link"></i></div>
  <div class="icon-btn" onclick="sw('settings', this, 4)"><i data-lucide="settings"></i></div>
</div>

<div class="content">
  <iframe id="home" class="active" src="home.html"></iframe>
  <iframe id="games" src="games.html"></iframe>
  <iframe id="chat" src="chat.html"></iframe>
  <iframe id="links" src="links.html"></iframe>
  <iframe id="settings" src="settings.html"></iframe>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
// Initialiseer de icoontjes
lucide.createIcons();

function sw(id, el, index){
  // 1. Switch de Iframes (direct via display block/none)
  document.querySelectorAll("iframe").forEach(f => {
    f.classList.toggle("active", f.id === id);
  });

  // 2. Update de actieve kleur van de iconen
  document.querySelectorAll(".icon-btn").forEach(b => {
    b.classList.remove("active");
  });
  el.classList.add("active");

  // 3. Slide de indicator naar de juiste positie
  // We vermenigvuldigen de index met de knop-hoogte (60px)
  const indicator = document.getElementById('indicator');
  indicator.style.transform = `translateY(${index * 60}px)`;
}
</script>

</body>
</html>
