<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ZYNQ v3</title><style>:root{--accent:#6366f1;--bg:#060607;--sidebar:#141417;--panel:#1c1d21;--text:#f1f2f8;--muted:#8f94a3;--btn-size:60px;--notification:#22c55e}body{margin:0;height:100vh;display:flex;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;background:var(--bg);color:var(--text);overflow:hidden}.sidebar{width:var(--btn-size);background:var(--sidebar);display:flex;flex-direction:column;align-items:center;border-right:1px solid rgba(255,255,255,.06);position:relative}#indicator{position:absolute;left:0;top:0;width:3px;height:30px;background:var(--accent);border-radius:0 4px 4px 0;transition:transform .35s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:10;margin-top:15px}.icon-btn{width:var(--btn-size);height:var(--btn-size);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);position:relative}.icon-btn.active{color:var(--accent)}.badge{position:absolute;top:18px;right:18px;width:10px;height:10px;background:var(--notification);border-radius:50%;border:2px solid var(--sidebar);display:none}.badge.visible{display:block}.content{flex:1;position:relative;background:var(--panel)}iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--panel)}iframe.active{display:block}</style></head><body><div class="sidebar"><div id="indicator"></div><div class="icon-btn active" onclick="sw('home',this,0)"><i data-lucide="home"></i></div><div class="icon-btn" onclick="sw('games',this,1)"><i data-lucide="gamepad-2"></i></div><div id="chat-nav" class="icon-btn" onclick="sw('chat',this,2)"><i data-lucide="message-circle"></i><div id="chat-badge" class="badge"></div></div><div class="icon-btn" onclick="sw('links',this,3)"><i data-lucide="link"></i></div><div class="icon-btn" onclick="sw('settings',this,4)"><i data-lucide="settings"></i></div></div><div class="content"><iframe id="home" class="active" src="home.html"></iframe><iframe id="games" src="games.html"></iframe><iframe id="chat" src="chat.html"></iframe><iframe id="links" src="links.html"></iframe><iframe id="settings" src="settings.html"></iframe></div><script src="https://unpkg.com/lucide@latest"></script><script>function initIcons(){window.lucide&&lucide.createIcons()}window.addEventListener("load",initIcons);let activeTab="home";function sw(id,el,i){activeTab=id;document.querySelectorAll("iframe").forEach(f=>f.classList.toggle("active",f.id===id));document.querySelectorAll(".icon-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");document.getElementById("indicator").style.transform=`translateY(${i*60}px)`}function updateBadge(s){const b=document.getElementById("chat-badge");if(!s)return;const chatActive=document.getElementById("chat").classList.contains("active");b.classList.toggle("visible",!!s.hasUnread&&!chatActive)}window.addEventListener("message",e=>{if(e.data?.type==="zynq_state")updateBadge(e.data)})</script></body></html>
