<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ZYNQ Sidebar SPA</title>

<style>
:root{
  --accent:#6366f1;
  --bg:#060607;
  --sidebar:#141417;
  --panel:#1c1d21;
  --text:#f1f2f8;
  --muted:#8f94a3;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */
.sidebar{
  width:60px;
  background:var(--sidebar);
  display:flex;
  flex-direction:column;
  align-items:center;
  border-right:1px solid rgba(255,255,255,.06);
}

/* ICONS */
.icon-btn{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:var(--text);
  transition:background .15s ease;
  position:relative;
}

.icon-btn:hover{
  background:rgba(255,255,255,.06);
}

.icon-btn.active{
  background:rgba(99,102,241,.18);
}

.icon-btn.active::before{
  content:"";
  position:absolute;
  left:0;
  width:3px;
  height:60%;
  background:var(--accent);
  border-radius:0 4px 4px 0;
}

/* ICON SIZE */
.icon-btn svg{
  width:22px;
  height:22px;
}

/* CONTENT */
.content{
  flex:1;
  position:relative;
  overflow:hidden;
  background:var(--panel);
}

/* IFRAME SYSTEM */
iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  opacity:0;
  pointer-events:none;
  background:var(--panel);
}

iframe.active{
  opacity:1;
  pointer-events:auto;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="icon-btn active" onclick="sw('home',this)"><i data-lucide="home"></i></div>
  <div class="icon-btn" onclick="sw('games',this)"><i data-lucide="gamepad-2"></i></div>
  <div class="icon-btn" onclick="sw('chat',this)"><i data-lucide="message-circle"></i></div>
  <div class="icon-btn" onclick="sw('links',this)"><i data-lucide="link"></i></div>
  <div class="icon-btn" onclick="sw('settings',this)"><i data-lucide="settings"></i></div>
</div>

<div class="content">
  <iframe id="home" class="active" src="home.html"></iframe>
  <iframe id="games" src="games.html"></iframe>
  <iframe id="chat" src="chat.html"></iframe>
  <iframe id="links" src="links.html"></iframe>
  <iframe id="settings" src="settings.html"></iframe>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
lucide.createIcons();

function sw(id,el){
  document.querySelectorAll("iframe").forEach(f=>{
    f.classList.toggle("active",f.id===id);
  });

  document.querySelectorAll(".icon-btn").forEach(b=>{
    b.classList.remove("active");
  });

  el.classList.add("active");
}
</script>

</body>
</html>
