<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZYNQ P2P - Pro Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.2/index.min.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --bg: #060607;
            --sidebar-bg: #141417;
            --chat-bg: #1c1d21;
            --input-bg: #25272d;
            --text-main: #f1f2f8;
            --text-muted: #8f94a3;
            --success: #10b981;
            --danger: #f43f5e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 300px 1fr;
        }

        /* SIDEBAR */
        #sidebar {
            background: var(--sidebar-bg);
            display: grid;
            grid-template-rows: auto auto 1fr;
            border-right: 1px solid #0a0a0b;
            box-shadow: 4px 0 12px -4px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .sidebar-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--accent), #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .add-btn {
            background: transparent;
            border: none;
            font-size: 32px;
            color: var(--text-main);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .add-btn:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(1.1);
        }

        .my-profile {
            padding: 20px;
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        #myId {
            background: #0a0a0b;
            padding: 14px 16px;
            border-radius: 12px;
            font-family: 'SF Mono', monospace;
            color: var(--accent);
            font-size: 13.5px;
            cursor: pointer;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.05);
        }

        #myId:hover {
            background: #111113;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        #friendsList {
            padding: 12px 8px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #6366f1 #25272d;
        }

        .friend-row {
            padding: 14px 16px;
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border-radius: 14px;
            margin-bottom: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .friend-row:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(4px);
        }

        .friend-row.active {
            background: rgba(99, 102, 241, 0.15);
            color: white;
        }

        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent), #a5b4fc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 12px -2px rgba(99, 102, 241, 0.4);
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--sidebar-bg);
            border: 2px solid var(--sidebar-bg);
        }

        .status-dot.online {
            background: var(--success);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
        }

        .friend-info {
            min-width: 0;
        }

        .friend-name {
            font-weight: 600;
            font-size: 15.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .friend-id {
            font-size: 12px;
            font-family: 'SF Mono', monospace;
            opacity: 0.65;
            margin-top: 2px;
        }

        .edit-btn {
            opacity: 0;
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .friend-row:hover .edit-btn {
            opacity: 1;
        }

        /* MAIN AREA */
        #main {
            display: grid;
            grid-template-rows: 64px 1fr auto;
            background: var(--chat-bg);
            position: relative;
        }

        .header {
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.3);
            background: var(--chat-bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
        }

        .burger-btn {
            background: none;
            border: none;
            width: 44px;
            height: 44px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            gap: 5px;
            padding: 0;
        }

        .burger-btn span {
            width: 24px;
            height: 2.5px;
            background: var(--text-main);
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .burger-btn.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .burger-btn.open span:nth-child(2) {
            opacity: 0;
            transform: scale(0);
        }

        .burger-btn.open span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -6px);
        }

        #chatHeaderContent {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        #chatTitle {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        #onlineIndicator {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* CHAT AREA */
        #chat {
            padding: 28px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: linear-gradient(to bottom, var(--chat-bg), #1a1b1f);
        }

        .msg {
            max-width: 72%;
            padding: 14px 20px;
            border-radius: 22px;
            font-size: 15.5px;
            line-height: 1.45;
            word-wrap: break-word;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .msg.me {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .msg.other {
            align-self: flex-start;
            background: var(--input-bg);
            border-bottom-left-radius: 6px;
        }

        /* INPUT BAR - hidden by default until a chat is open */
        .input-bar {
            padding: 20px 24px;
            background: var(--chat-bg);
            border-top: 1px solid rgba(0,0,0,0.3);
            display: none;
            gap: 12px;
            align-items: center;
        }

        input {
            flex: 1;
            background: var(--input-bg);
            border: none;
            padding: 16px 22px;
            border-radius: 9999px;
            color: white;
            font-size: 15.5px;
            outline: none;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 32px;
            height: 52px;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px -4px var(--accent);
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px -4px var(--accent);
        }

        button:disabled {
            background: #3b3d44;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* OVERLAY FOR MOBILE */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(6, 6, 7, 0.85);
            z-index: 999;
            display: none;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        /* MODALS */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(6, 6, 7, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(12px);
        }

        .modal-content {
            background: var(--sidebar-bg);
            padding: 32px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            margin: 20px;
        }

        .modal-content h2 {
            margin: 0 0 12px 0;
            font-size: 24px;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
            }

            #sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 300px;
                transform: translateX(-100%);
                box-shadow: 12px 0 30px -10px rgba(0, 0, 0, 0.7);
            }

            #sidebar.open {
                transform: translateX(0);
            }

            .burger-btn {
                display: flex;
            }

            .header {
                padding: 0 16px;
            }

            #chat {
                padding: 20px 16px;
            }

            .input-bar {
                padding: 16px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 9999px;
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="logo">ZYNQ</div>
            <button onclick="openAddModal()" class="add-btn">+</button>
        </div>

        <div class="my-profile">
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px; font-weight: 700; letter-spacing: 0.5px;">YOUR P2P ADDRESS</div>
            <div id="myId" onclick="copyId()">Connecting...</div>
        </div>

        <div id="friendsList"></div>
    </div>

    <!-- MAIN CHAT -->
    <div id="main">
        <div class="header">
            <!-- BURGER MENU -->
            <button id="menuBtn" class="burger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div id="chatHeaderContent">
                <div id="chatTitle">Select a conversation</div>
                <div id="onlineIndicator"></div>
            </div>
        </div>

        <div id="chat">
            <div style="margin: auto; color: var(--text-muted); text-align: center; max-width: 320px;">
                <h2 style="font-size: 28px; margin-bottom: 8px; background: linear-gradient(90deg, var(--accent), #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ZYNQ Direct Connect</h2>
                <p style="font-size: 15.5px; line-height: 1.5;">Secure peer-to-peer communication.<br>No servers. No logs. Just you and your contacts.</p>
            </div>
        </div>

        <div class="input-bar">
            <input id="msgInp" placeholder="Type your message here..." disabled onkeypress="if(event.key==='Enter') send()">
            <button id="sendBtn" onclick="send()" disabled>SEND</button>
        </div>
    </div>

    <!-- MOBILE OVERLAY -->
    <div id="overlay" onclick="toggleMenu()"></div>

    <!-- MODALS -->
    <div id="setupModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Welcome to ZYNQ Pro</h2>
            <p style="color: var(--text-muted); margin-bottom: 24px;">Choose a name for this device.</p>
            <input id="userName" placeholder="Your name..." style="width:100%; padding: 16px 20px; border-radius: 14px; border: 1px solid #25272d; background: #25272d; color: white; font-size: 16px; margin-bottom: 24px;">
            <button onclick="saveSetup()" style="width:100%; height: 56px; background: var(--accent); border-radius: 14px; font-size: 16px; font-weight: 700;">START INTERFACE</button>
        </div>
    </div>

    <div id="friendModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0">Add Friend</h2>
            <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 12px;">
                <div>
                    <label style="font-size: 12px; color: var(--text-muted); font-weight: 600;">PEER ID</label>
                    <input id="fId" placeholder="ZNQ-XXXXXX" style="width:100%; padding: 16px 20px; border-radius: 14px; border: 1px solid #25272d; background: #25272d; color: white; font-size: 16px; margin-top: 6px;">
                </div>
                <div>
                    <label style="font-size: 12px; color: var(--text-muted); font-weight: 600;">NAME (OPTIONAL)</label>
                    <input id="fAlias" placeholder="E.g. Mark" style="width:100%; padding: 16px 20px; border-radius: 14px; border: 1px solid #25272d; background: #25272d; color: white; font-size: 16px; margin-top: 6px;">
                </div>
                <div style="display: flex; gap: 12px; margin-top: 8px;">
                    <button onclick="closeModal()" style="flex:1; height: 52px; background: var(--input-bg); border-radius: 14px; font-weight: 600;">CANCEL</button>
                    <button onclick="saveFriend()" style="flex:1; height: 52px; background: var(--accent); border-radius: 14px; font-weight: 700;">SAVE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let peer, currentChat;
        let onlineStatus = {};
        let db = JSON.parse(localStorage.getItem('zynq_pro_v1')) || {
            user: { name: '', id: '' },
            friends: {}
        };

        window.onload = () => {
            if (!db.user.name) {
                document.getElementById('setupModal').style.display = 'flex';
            } else {
                init();
            }
        };

        function saveSetup() {
            const n = document.getElementById('userName').value.trim();
            if (!n) return;
            db.user.name = n;
            db.user.id = 'ZNQ-' + Math.random().toString(36).substring(2, 8).toUpperCase();
            save();
            document.getElementById('setupModal').style.display = 'none';
            init();
        }

        function generateRandomName() {
            return "User" + Math.floor(1000 + Math.random() * 8999);
        }

        function init() {
            peer = new ZYNQ.Peer({ id: db.user.id });
            peer.on('ready', (id) => {
                document.getElementById('myId').textContent = id;
                checkAllStatuses();
                setInterval(checkAllStatuses, 10000);
                render();
            });
            peer.on('message', (payload) => receive(payload.from, payload.data.text));
            peer.on('open', (id) => { onlineStatus[id] = true; updateUIState(); render(); });
            peer.on('close', ({id}) => { onlineStatus[id] = false; updateUIState(); render(); });

            const menuBtn = document.getElementById('menuBtn');
            if (menuBtn) {
                menuBtn.addEventListener('click', toggleMenu);
            }
        }

        function checkAllStatuses() {
            Object.keys(db.friends).forEach(id => peer.connect(id));
        }

        function updateUIState() {
            const inpBar = document.querySelector('.input-bar');
            const headerContent = document.getElementById('chatHeaderContent');
            const title = document.getElementById('chatTitle');
            const indicator = document.getElementById('onlineIndicator');

            if (!currentChat) {
                // Empty state: hide title, indicator and input bar
                title.textContent = '';
                indicator.style.display = 'none';
                inpBar.style.display = 'none';
                return;
            }

            // Chat is open
            const friend = db.friends[currentChat];
            title.textContent = friend.alias;
            indicator.style.display = 'flex';

            const isOnline = onlineStatus[currentChat] || false;
            indicator.innerHTML = isOnline 
                ? `<span style="color: var(--success); font-size: 18px;">●</span> ONLINE`
                : `<span style="color: var(--danger); font-size: 18px;">●</span> OFFLINE`;

            const inp = document.getElementById('msgInp');
            const btn = document.getElementById('sendBtn');
            inp.disabled = !isOnline;
            btn.disabled = !isOnline;

            inpBar.style.display = 'flex';
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = "Add Friend";
            document.getElementById('fId').value = "";
            document.getElementById('fId').disabled = false;
            document.getElementById('fAlias').value = "";
            document.getElementById('friendModal').style.display = 'flex';
        }

        function openEditModal(e, id) {
            e.stopPropagation();
            document.getElementById('modalTitle').textContent = "Edit Name";
            document.getElementById('fId').value = id;
            document.getElementById('fId').disabled = true;
            document.getElementById('fAlias').value = db.friends[id].alias;
            document.getElementById('friendModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('friendModal').style.display = 'none';
        }

        function saveFriend() {
            const id = document.getElementById('fId').value.trim().toUpperCase();
            let alias = document.getElementById('fAlias').value.trim();

            if (!alias) alias = generateRandomName();
            if (id) {
                if (!db.friends[id]) {
                    db.friends[id] = { alias: alias, msgs: [], unread: 0 };
                } else {
                    db.friends[id].alias = alias;
                }
                peer.connect(id);
                save();
                render();
                closeModal();
                if (id === currentChat) updateUIState();
            }
        }

        function send() {
            const inp = document.getElementById('msgInp');
            if (!inp.value || !currentChat || !onlineStatus[currentChat]) return;

            peer.send(currentChat, { text: inp.value });
            db.friends[currentChat].msgs.push({ f: 'me', t: inp.value });
            save();
            renderMessages();
            inp.value = '';
        }

        function receive(from, text) {
            if (!db.friends[from]) {
                db.friends[from] = { alias: generateRandomName(), msgs: [], unread: 0 };
            }
            db.friends[from].msgs.push({ f: from, t: text });
            if (currentChat !== from) db.friends[from].unread = (db.friends[from].unread || 0) + 1;
            save();
            if (currentChat === from) renderMessages();
            render();
        }

        function render() {
            const fList = document.getElementById('friendsList');
            fList.innerHTML = '';

            Object.keys(db.friends).forEach(id => {
                const friend = db.friends[id];
                const isOnline = onlineStatus[id] || false;

                const div = document.createElement('div');
                div.className = `friend-row ${currentChat === id ? 'active' : ''}`;

                const firstLetter = friend.alias.charAt(0).toUpperCase();

                div.innerHTML = `
                    <div class="avatar-container">
                        <div class="avatar">${firstLetter}</div>
                        <div class="status-dot ${isOnline ? 'online' : ''}"></div>
                    </div>
                    <div class="friend-info">
                        <div class="friend-name">${friend.alias} ${friend.unread > 0 ? `<span style="background:var(--danger); padding:2px 7px; border-radius:9999px; font-size:10px; font-weight:700; margin-left:6px;">${friend.unread}</span>` : ''}</div>
                        <div class="friend-id">${id}</div>
                    </div>
                    <button class="edit-btn" onclick="openEditModal(event, '${id}')">EDIT</button>
                `;

                div.onclick = () => {
                    currentChat = id;
                    db.friends[id].unread = 0;
                    save();
                    updateUIState();
                    renderMessages();
                    render();
                    if (window.innerWidth <= 768) toggleMenu();
                };

                fList.appendChild(div);
            });
        }

        function renderMessages() {
            const c = document.getElementById('chat');
            c.innerHTML = '';
            if (!db.friends[currentChat]) return;

            db.friends[currentChat].msgs.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.f === 'me' ? 'me' : 'other'}`;
                d.textContent = m.t;
                c.appendChild(d);
            });
            c.scrollTop = c.scrollHeight;
        }

        function save() {
            localStorage.setItem('zynq_pro_v1', JSON.stringify(db));
        }

        function copyId() {
            navigator.clipboard.writeText(db.user.id).then(() => {
                const original = document.getElementById('myId').textContent;
                document.getElementById('myId').textContent = "Copied!";
                setTimeout(() => document.getElementById('myId').textContent = original, 1200);
            });
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('menuBtn');

            sidebar.classList.toggle('open');
            btn.classList.toggle('open');

            if (sidebar.classList.contains('open')) {
                overlay.style.display = 'block';
                overlay.style.opacity = '1';
            } else {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 300);
            }
        }
    </script>
</body>
</html>
