<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNQ Games</title>

    <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.2/index.min.js"></script>

    <style>
    :root {
        --accent: #6366f1;
        --bg: #060607;
        --card-bg: #111114;
        --nav: rgba(10, 10, 12, 0.98);
        --text: #f1f2f8;
        --muted: #64748b;
        --nav-height: 64px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
        width: 8px;
    }
    ::-webkit-scrollbar-track {
        background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
        border: 2px solid var(--bg);
    }
    ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
    }

    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
        -webkit-font-smoothing: antialiased;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
    }

    /* GPU Optimized Background */
    .bg-fixed {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: url('https://i.ytimg.com/vi/FlzJ5FQXBj8/maxresdefault.jpg') center/cover no-repeat;
        will-change: transform;
    }

    .bg-overlay {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: linear-gradient(180deg, rgba(6,6,7,0.5) 0%, rgba(6,6,7,1) 100%);
    }

    /* Header & Search */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-height);
        background: var(--nav);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        padding: 0 32px;
        z-index: 1000;
    }

    .nav-logo {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -1px;
        color: #fff;
        text-decoration: none;
        margin-right: 48px;
    }

    .search-wrapper {
        flex: 1;
        max-width: 480px;
        position: relative;
    }

    .search {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 10px 16px;
        color: #fff;
        font-size: 14px;
        outline: none;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search:focus {
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    /* Main View */
    .container {
        max-width: 1440px;
        margin: 0 auto;
        padding: calc(var(--nav-height) + 40px) 32px 60px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 24px;
    }

    /* Game Card */
    .card {
        background: var(--card-bg);
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.04);
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s ease;
        content-visibility: auto;
    }

    .card:hover {
        transform: scale(1.04);
        border-color: var(--accent);
        z-index: 10;
    }

    .thumb-box {
        position: relative;
        aspect-ratio: 4/3;
        background: #1a1a1d;
        overflow: hidden;
    }

    .thumb {
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        opacity: 0;
        transition: opacity 0.4s ease, transform 0.6s ease;
    }

    .thumb.loaded {
        opacity: 1;
    }

    .card:hover .thumb {
        transform: scale(1.1);
    }

    .info {
        padding: 14px;
    }

    .title {
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        font-weight: 500;
    }

    /* Empty state */
    .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 0;
        color: var(--muted);
        font-size: 15px;
    }

    @media (max-width: 640px) {
        .container { padding: calc(var(--nav-height) + 20px) 16px; }
        .grid { gap: 16px; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        .nav-logo { margin-right: 16px; }
    }
    </style>
</head>

<body>

<div class="bg-fixed"></div>
<div class="bg-overlay"></div>

<nav class="navbar">
    <a href="#" class="nav-logo">ZYNQ</a>
    <div class="search-wrapper">
        <input id="search" class="search" placeholder="Type om te zoeken..." autocomplete="off">
    </div>
</nav>

<div class="container">
    <div id="grid" class="grid"></div>
</div>

<script>
const grid = document.getElementById("grid");
const searchInput = document.getElementById("search");

// High-performance image loading
const imageObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const thumb = entry.target;
            const img = new Image();
            img.src = thumb.dataset.src;
            img.onload = () => {
                thumb.style.backgroundImage = `url('${thumb.dataset.src}')`;
                thumb.classList.add('loaded');
            };
            observer.unobserve(thumb);
        }
    });
}, { rootMargin: '200px' });

function render() {
    const games = ZYNQ.games.list;
    grid.innerHTML = "";

    if (games.length === 0) {
        grid.innerHTML = `<div class="empty">Geen games gevonden voor deze zoekopdracht.</div>`;
        return;
    }

    const fragment = document.createDocumentFragment();

    games.forEach(game => {
        const card = document.createElement("div");
        card.className = "card";
        
        card.innerHTML = `
            <div class="thumb-box">
                <div class="thumb" data-src="${game.thumb}"></div>
            </div>
            <div class="info">
                <div class="title">${game.name}</div>
                <div class="meta">${game.category || "Algemeen"}</div>
            </div>
        `;

        card.onclick = () => {
            ZYNQ.games.addToHistory(game.alias);
            window.location.href = game.url;
        };

        imageObserver.observe(card.querySelector('.thumb'));
        fragment.appendChild(card);
    });

    grid.appendChild(fragment);
}

// Initialization
(async () => {
    try {
        await ZYNQ.games.init({ mode: "all" });
        render();
    } catch (e) {
        console.error("ZYNQ initialization failed:", e);
    }
})();

// Debounced search for performance
let timeout;
searchInput.addEventListener("input", e => {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        const q = e.target.value.trim();
        q ? ZYNQ.games.search(q) : ZYNQ.games.reset();
        render();
    }, 150);
});
</script>

</body>
</html>
