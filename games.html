<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNQ | Premium Dashboard</title>
    <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.2/index.min.js"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    :root{--accent:#6366f1;--accent-glow:rgba(99,102,241,0.3);--bg:#020203;--card-bg:#0d0d12;--nav:rgba(2,2,3,0.9);--text:#fff;--muted:#64748b;--nav-height:72px}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#222;border-radius:10px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.4;overflow-x:hidden}
    .bg-fixed{position:fixed;inset:0;z-index:-2;background:url('https://i.ytimg.com/vi/FlzJ5FQXBj8/maxresdefault.jpg') center/cover no-repeat;filter:brightness(0.3);transform:translateZ(0)}
    .bg-overlay{position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 50% 0%,var(--accent-glow) 0%,var(--bg) 85%)}
    .navbar{position:fixed;top:0;left:0;width:100%;height:var(--nav-height);background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;padding:0 30px;z-index:1000}
    .nav-logo{font-size:24px;font-weight:800;letter-spacing:-1px;background:linear-gradient(90deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;margin-right:40px}
    .search-wrapper{flex:1;max-width:400px}
    .search{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 16px;color:#fff;font-size:13px;outline:none;transition:0.2s ease}
    .search:focus{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
    .hero{padding:calc(var(--nav-height) + 30px) 30px 40px}
    .featured-card{width:100%;height:380px;border-radius:24px;background:#000;position:relative;overflow:hidden;display:flex;align-items:center;border:1px solid rgba(255,255,255,0.08)}
    .featured-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.4;transition:0.8s ease}
    .featured-content{position:relative;z-index:2;padding:50px;max-width:600px}
    .badge{display:inline-flex;padding:5px 12px;background:var(--accent);border-radius:30px;font-size:10px;font-weight:800;text-transform:uppercase;margin-bottom:15px;letter-spacing:1px}
    .featured-title{font-size:52px;font-weight:800;margin-bottom:8px;line-height:1;letter-spacing:-2px}
    .featured-desc{color:#cbd5e1;margin-bottom:20px;font-size:16px}
    .btn{display:inline-flex;padding:12px 28px;background:#fff;color:#000;text-decoration:none;border-radius:10px;font-weight:800;font-size:14px;transition:0.3s}
    .btn:hover{transform:translateY(-3px);box-shadow:0 10px 20px var(--accent-glow)}
    .container{padding:0 30px 80px;width:100%;margin:0 auto;max-width:1800px}
    .section-title{font-size:20px;font-weight:800;margin-bottom:25px;display:flex;align-items:center;gap:15px}
    .section-title::after{content:"";height:1px;flex:1;background:rgba(255,255,255,0.1)}
    .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px}
    .card{background:var(--card-bg);border-radius:16px;border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:0.3s;overflow:hidden}
    .card:hover{transform:translateY(-5px);border-color:var(--accent);background:rgba(255,255,255,0.03)}
    .thumb-box{aspect-ratio:4/3;width:100%;overflow:hidden;background:#111}
    .thumb{width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:0.5s ease}
    .thumb.loaded{opacity:1}
    .info{padding:12px}
    .title{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meta{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase}
    @media (max-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}
    @media (max-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
    @media (max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.hero,.container{padding:calc(var(--nav-height) + 20px) 20px 20px}.featured-title{font-size:32px}}
    </style>
</head>
<body>

<div class="bg-fixed"></div>
<div class="bg-overlay"></div>

<nav class="navbar">
    <a href="#" class="nav-logo">ZYNQ</a>
    <div class="search-wrapper">
        <input id="search" class="search" placeholder="Search the collection..." autocomplete="off">
    </div>
</nav>

<section class="hero" id="hero-section">
    <div class="featured-card">
        <div class="featured-img" id="featured-img"></div>
        <div class="featured-content">
            <span class="badge">Game of the Day</span>
            <h1 class="featured-title" id="featured-title">Loading...</h1>
            <p class="featured-desc">No download. No limits. Just pure gameplay.</p>
            <a href="#" class="btn" id="featured-link">Launch Now</a>
        </div>
    </div>
</section>

<div class="container">
    <h2 class="section-title">The Collection</h2>
    <div id="grid" class="grid"></div>
</div>

<script>
const grid = document.getElementById("grid");
const searchInput = document.getElementById("search");
const heroSection = document.getElementById("hero-section");

const imageObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const thumb = entry.target;
            const img = new Image();
            img.src = thumb.dataset.src;
            img.onload = () => {
                thumb.style.backgroundImage = `url('${thumb.dataset.src}')`;
                thumb.classList.add('loaded');
            };
            observer.unobserve(thumb);
        }
    });
}, { rootMargin: '200px' });

function render() {
    const games = ZYNQ.games.list;
    grid.innerHTML = "";
    if (games.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--muted);">No games found.</div>`;
        return;
    }

    if (!searchInput.value) {
        const now = new Date();
        const dateSeed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
        const dayIndex = dateSeed % games.length;
        const feat = games[dayIndex];
        document.getElementById("featured-title").innerText = feat.name;
        document.getElementById("featured-img").style.backgroundImage = `url('${feat.thumb}')`;
        document.getElementById("featured-link").onclick = (e) => {
            e.preventDefault();
            ZYNQ.games.addToHistory(feat.alias);
            window.location.href = feat.url;
        };
        heroSection.style.display = "block";
    } else {
        heroSection.style.display = "none";
    }

    const fragment = document.createDocumentFragment();
    games.forEach(game => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<div class="thumb-box"><div class="thumb" data-src="${game.thumb}"></div></div><div class="info"><div class="title">${game.name}</div><div class="meta">${game.category || "Game"}</div></div>`;
        card.onclick = () => {
            ZYNQ.games.addToHistory(game.alias);
            window.location.href = game.url;
        };
        imageObserver.observe(card.querySelector('.thumb'));
        fragment.appendChild(card);
    });
    grid.appendChild(fragment);
}

(async () => {
    try { await ZYNQ.games.init({ mode: "all" }); render(); } catch (e) { console.error(e); }
})();

let timeout;
searchInput.addEventListener("input", e => {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        const q = e.target.value.trim();
        q ? ZYNQ.games.search(q) : ZYNQ.games.reset();
        render();
    }, 200);
});
</script>
</body>
</html>
