<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZYNQ Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.2/index.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.3);
            --bg: #020203;
            --card-bg: #0d0d12;
            --nav: rgba(2,2,3,0.9);
            --text: #fff;
            --muted: #64748b;
            --nav-height: 72px;
            --success: #10b981;
            --danger: #f43f5e;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        html { height: 100dvh; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.4; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            display: grid; 
            grid-template-columns: 300px 1fr; 
            grid-template-rows: 1fr; 
        }
        .bg-fixed { 
            position: fixed; 
            inset: 0; 
            z-index: -2; 
            background: url('https://i.ytimg.com/vi/FlzJ5FQXBj8/maxresdefault.jpg') center/cover no-repeat; 
            filter: brightness(0.3); 
            transform: translateZ(0); 
        }
        .bg-overlay { 
            position: fixed; 
            inset: 0; 
            z-index: -1; 
            background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, var(--bg) 85%); 
        }
        #sidebar { 
            background: var(--card-bg); 
            display: grid; 
            grid-template-rows: auto auto 1fr; 
            border-right: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 4px 0 12px -4px rgba(0,0,0,.6); 
            z-index: 1000; 
            transition: .4s cubic-bezier(.32,.72,0,1); 
            backdrop-filter: blur(20px); 
        }
        .sidebar-header { 
            padding: 16px 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid rgba(255,255,255,.06); 
            background: rgba(2,2,3,.9); 
        }
        .add-btn { 
            background: 0 0; 
            border: none; 
            width: 44px; 
            height: 44px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            color: var(--text); 
            padding: 0; 
            transition: .2s cubic-bezier(.4,0,.2,1); 
        }
        .add-btn:hover { transform: scale(1.12); }
        .my-profile { 
            padding: 20px; 
            background: rgba(0,0,0,.25); 
            border-bottom: 1px solid rgba(255,255,255,.06); 
        }
        #myId { 
            background: #0a0a0b; 
            padding: 14px 16px; 
            border-radius: 12px; 
            font-family: 'SF Mono', monospace; 
            color: var(--accent); 
            font-size: 13.5px; 
            cursor: pointer; 
            text-align: center; 
            border: 1px solid rgba(99,102,241,.3); 
            transition: .2s cubic-bezier(.4,0,.2,1); 
            box-shadow: inset 0 2px 0 rgba(255,255,255,.05); 
        }
        #myId:hover { 
            background: #111113; 
            border-color: #a5b4fc; 
            transform: translateY(-1px); 
        }
        #friendsList { 
            padding: 12px 8px; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            scrollbar-color: #6366f1 #25272d; 
        }
        .friend-row { 
            padding: 14px 16px; 
            display: grid; 
            grid-template-columns: 48px 1fr auto; 
            align-items: center; 
            gap: 14px; 
            cursor: pointer; 
            border-radius: 16px; 
            margin-bottom: 6px; 
            transition: .3s cubic-bezier(.4,0,.2,1); 
            position: relative; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,.05); 
        }
        .friend-row:hover { 
            transform: translateY(-3px); 
            border-color: var(--accent); 
            background: rgba(255,255,255,.03); 
            box-shadow: 0 10px 20px var(--accent-glow); 
        }
        .friend-row.active { 
            background: rgba(255,255,255,.08); 
            border-color: var(--accent); 
        }
        .avatar-container { 
            position: relative; 
            width: 48px; 
            height: 48px; 
        }
        .avatar { 
            width: 48px; 
            height: 48px; 
            background: linear-gradient(135deg, var(--accent), #a5b4fc); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            font-size: 20px; 
            color: #fff; 
            box-shadow: 0 4px 12px -2px rgba(99,102,241,.4); 
        }
        .status-dot { 
            position: absolute; 
            bottom: 2px; 
            right: 2px; 
            width: 16px; 
            height: 16px; 
            border-radius: 50%; 
            background: var(--card-bg); 
            border: 3px solid var(--card-bg); 
            box-shadow: 0 0 0 3px rgba(16,185,129,.3); 
        }
        .status-dot.online { 
            background: var(--success); 
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 
            0%, 100% { box-shadow: 0 0 0 3px rgba(16,185,129,.3); } 
            50% { box-shadow: 0 0 0 7px rgba(16,185,129,0); } 
        }
        .friend-info { min-width: 0; overflow: hidden; }
        .friend-name-container { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: nowrap; 
        }
        .friend-name { 
            font-weight: 600; 
            font-size: 15.5px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            min-width: 0; 
            flex: 1; 
        }
        .unread-pill { 
            background: var(--danger); 
            color: #fff; 
            font-size: 11px; 
            font-weight: 700; 
            padding: 2px 9px; 
            border-radius: 9999px; 
            white-space: nowrap; 
            flex-shrink: 0; 
            min-width: 18px; 
            text-align: center; 
            box-shadow: 0 1px 3px rgba(0,0,0,.3); 
        }
        .friend-id { 
            font-size: 12px; 
            font-family: 'SF Mono', monospace; 
            opacity: .65; 
            margin-top: 2px; 
        }
        .menu-btn { 
            opacity: 0; 
            background: 0 0; 
            border: none; 
            color: var(--muted); 
            padding: 6px; 
            border-radius: 10px; 
            transition: .2s ease; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 36px; 
            height: 36px; 
        }
        .friend-row:hover .menu-btn { opacity: 1; }
        #main { 
            display: grid; 
            grid-template-rows: 72px 1fr auto; 
            background: var(--card-bg); 
            position: relative; 
            height: 100%; 
            min-height: 0; 
            box-shadow: inset 0 0 40px -20px rgba(0,0,0,.6); 
        }
        .header { 
            padding: 0 30px; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            border-bottom: 1px solid rgba(255,255,255,.05); 
            background: var(--nav); 
            backdrop-filter: blur(20px); 
            box-shadow: 0 2px 8px rgba(0,0,0,.15); 
            z-index: 10; 
            height: var(--nav-height); 
        }
        .burger-btn { 
            background: 0 0; 
            border: none; 
            width: 44px; 
            height: 44px; 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            gap: 5px; 
            padding: 0; 
        }
        .burger-btn span { 
            width: 24px; 
            height: 2.5px; 
            background: var(--text); 
            border-radius: 9999px; 
            transition: .3s cubic-bezier(.4,0,.2,1); 
        }
        .burger-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px,6px); }
        .burger-btn.open span:nth-child(2) { opacity: 0; transform: scale(0); }
        .burger-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(7px,-6px); }
        #chatHeaderContent { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            flex: 1; 
        }
        #chatTitle { 
            font-size: 20px; 
            font-weight: 800; 
            letter-spacing: -.5px; 
        }
        #onlineIndicator { 
            font-size: 13px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        #chat { 
            padding: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            background: var(--card-bg); 
            scroll-behavior: smooth; 
            flex: 1; 
            min-height: 0; 
            position: relative; 
        }
        .message-row { 
            display: flex; 
            gap: 10px; 
            max-width: 85%; 
            margin-bottom: 4px; 
        }
        .message-row.me { margin-left: auto; flex-direction: row-reverse; }
        .message-row.other { margin-right: auto; }
        .avatar-chat { 
            width: 34px; 
            height: 34px; 
            background: linear-gradient(135deg, var(--accent), #a5b4fc); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            font-size: 15px; 
            color: #fff; 
            flex-shrink: 0; 
            margin-top: 2px; 
            box-shadow: 0 2px 8px -2px rgba(99,102,241,.4); 
        }
        .message-content { 
            display: flex; 
            flex-direction: column; 
            gap: 3px; 
            max-width: 100%; 
        }
        .bubble { 
            display: inline-block; 
            max-width: 100%; 
            padding: 14px 20px; 
            border-radius: 22px; 
            font-size: 15.5px; 
            line-height: 1.4; 
            white-space: pre-wrap; 
            word-break: keep-all; 
            overflow-wrap: break-word; 
            box-shadow: 0 2px 6px rgba(0,0,0,.15); 
        }
        .bubble.me { 
            background: var(--accent); 
            color: #fff; 
            border-bottom-right-radius: 6px; 
        }
        .bubble.other { 
            background: rgba(255,255,255,.06); 
            border: 1px solid rgba(255,255,255,.05); 
            border-bottom-left-radius: 6px; 
        }
        .timestamp { 
            font-size: 11px; 
            color: var(--muted); 
            padding: 0 6px; 
            opacity: .85; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        .message-status {
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
            padding: 0 6px;
        }
        .typing-dots { 
            display: flex; 
            align-items: center; 
            gap: 4px; 
        }
        .typing-dot { 
            width: 6px; 
            height: 6px; 
            background: #8f94a3; 
            border-radius: 50%; 
            animation: typingBounce 1.25s infinite ease-in-out; 
        }
        .typing-dot:nth-child(2) { animation-delay: .12s; }
        .typing-dot:nth-child(3) { animation-delay: .24s; }
        @keyframes typingBounce { 
            0%, 80%, 100% { transform: translateY(0); } 
            40% { transform: translateY(-4px); } 
        }
        .bubble.typing-bubble { 
            padding: 11px 20px; 
            display: flex; 
            align-items: center; 
        }
        input { 
            flex: 1; 
            background: rgba(255,255,255,.06); 
            border: 1px solid rgba(255,255,255,.1); 
            padding: 16px 22px; 
            border-radius: 12px; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            transition: .2s ease; 
        }
        input:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px var(--accent-glow); 
        }
        input::placeholder { color: var(--muted); }
        button { 
            background: var(--accent); 
            color: #fff; 
            border: none; 
            padding: 0 32px; 
            height: 52px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 14px; 
            letter-spacing: .5px; 
            transition: .2s cubic-bezier(.4,0,.2,1); 
            box-shadow: 0 4px 12px -4px var(--accent); 
        }
        button:hover:not(:disabled) { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px var(--accent-glow); 
        }
        button:disabled { 
            background: #3b3d44; 
            color: #8f94a3; 
            opacity: .75; 
            cursor: not-allowed; 
            box-shadow: none; 
        }
        .input-bar { 
            display: none; 
            align-items: center; 
            gap: 12px; 
            padding: 16px 30px; 
            background: var(--card-bg); 
            border-top: 1px solid rgba(255,255,255,.05); 
            box-shadow: 0 -4px 12px -4px rgba(0,0,0,.4); 
        }
        #overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(2,2,3,.75); 
            z-index: 900; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity .4s cubic-bezier(.32,.72,0,1); 
            display: none; 
        }
        .modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(2,2,3,.92); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
            backdrop-filter: blur(12px); 
        }
        .modal-content { 
            background: var(--card-bg); 
            padding: 32px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 25px 50px -12px rgb(0 0 0 /.6); 
            margin: 20px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,.05); 
        }
        #contextMenu { 
            position: absolute; 
            background: var(--card-bg); 
            border-radius: 16px; 
            box-shadow: 0 15px 30px -10px rgba(0,0,0,.7); 
            z-index: 10000; 
            min-width: 170px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,.08); 
            display: none; 
        }
        #contextMenu div { 
            padding: 14px 20px; 
            cursor: pointer; 
            font-size: 15px; 
            transition: .2s ease; 
        }
        #contextMenu div:hover { background: rgba(255,255,255,.1); }
        #contextMenu div:last-child { color: var(--danger); }
        #homeScreen { 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
            text-align: center; 
            padding: 40px 24px; 
            background: var(--card-bg); 
            position: absolute; 
            inset: 0; 
            overflow: auto; 
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15,23,42,.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,.3);
            z-index: 100000;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        @media (max-width: 768px) { 
            body { grid-template-columns: 1fr; } 
            #sidebar { 
                position: fixed; 
                left: 0; 
                top: 0; 
                bottom: 0; 
                width: 280px; 
                transform: translateX(-100%); 
            } 
            #sidebar.open { transform: translateX(0); } 
            .burger-btn { display: flex; } 
            .message-row { max-width: 90%; } 
        }
    </style>
</head>
<body>
    <div class="bg-fixed"></div>
    <div class="bg-overlay"></div>
    <div id="sidebar">
        <div class="sidebar-header">
            <button onclick="openAddModal()" class="add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
        <div class="my-profile">
            <div style="font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 700; letter-spacing: 0.5px;">YOUR CHAT ID</div>
            <div id="myId" onclick="copyId()">Connecting...</div>
        </div>
        <div id="friendsList"></div>
    </div>
    <div id="main">
        <div class="header">
            <button id="menuBtn" class="burger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div id="chatHeaderContent">
                <div id="chatTitle"></div>
                <div id="onlineIndicator"></div>
            </div>
            <button onclick="showHelpModal()" style="margin-left:auto;background:none;border:none;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:26px;cursor:pointer;opacity:0.7">?</button>
        </div>
        <div id="chat">
            <div id="homeScreen" style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;">
                <div style="position:absolute;inset:0;background-image:url('https://i.ytimg.com/vi/FlzJ5FQXBj8/maxresdefault.jpg');background-size:cover;background-position:center;opacity:0.25;transform:scale(1.02);"></div>
                <div style="position:absolute;inset:0;background:rgba(0,0,0,0.35);"></div>
                <div style="position:relative;z-index:1;max-width:420px;width:100%;text-align:center;color:rgba(229,231,235,0.85);">
                    <p style="font-size:19px;margin:0 0 32px;line-height:1.5;color:rgba(209,213,219,0.85);">No chat opened.<br>Open a chat or create a new one!</p>
                </div>
            </div>
            <div id="messagesWrapper" style="display:none;height:100%;flex-direction:column"></div>
        </div>
        <div class="input-bar">
            <input id="msgInp" placeholder="Type your message here..." disabled onkeypress="if(event.key==='Enter') send()">
            <button id="sendBtn" onclick="send()" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-up-icon lucide-arrow-up">
                    <path d="m5 12 7-7 7 7"/>
                    <path d="M12 19V5"/>
                </svg>
            </button>
        </div>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>
    <div id="friendModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0">Add Friend</h2>
            <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 12px;">
                <div>
                    <label style="font-size: 12px; color: var(--muted); font-weight: 600;">CHAT ID</label>
                    <input id="fId" placeholder="ZNQ-XXXXXX" style="width:100%; padding: 16px 20px; border-radius: 14px; border: 1px solid #25272d; background: #25272d; color: white; font-size: 16px; margin-top: 6px;">
                </div>
                <div>
                    <label style="font-size: 12px; color: var(--muted); font-weight: 600;">NAME (OPTIONAL)</label>
                    <input id="fAlias" placeholder="E.g. Mark" style="width:100%; padding: 16px 20px; border-radius: 14px; border: 1px solid #25272d; background: #25272d; color: white; font-size: 16px; margin-top: 6px;">
                </div>
                <div style="display: flex; gap: 12px; margin-top: 8px;">
                    <button onclick="closeModal()" style="flex:1; height: 52px; background: rgba(255,255,255,.06); border-radius: 14px; font-weight: 600;">CANCEL</button>
                    <button onclick="saveFriend()" style="flex:1; height: 52px; background: var(--accent); border-radius: 14px; font-weight: 700;">SAVE</button>
                </div>
            </div>
        </div>
    </div>
    <div id="helpModal" class="modal">
        <div class="modal-content" style="max-width:420px; padding: 20px; position:relative;">
            <h2 style="margin-top:0; text-align:center;">ZYNQ Tutorial</h2>
            <div style="margin-top:16px; width:100%; aspect-ratio:16/9; border-radius:14px; overflow:hidden; background:black;">
                <video src="./assets/video/zynq-chat-tutorial.mp4" controls controlsList="nodownload" style="width:100%; height:100%; display:block;" allowfullscreen></video>
            </div>
            <button onclick="closeHelpModal()" style=" margin-top:18px; width:100%; height:52px; border:none; border-radius:14px; background:#6366f1; color:white; font-weight:700; cursor:pointer; "> Close </button>
        </div>
    </div>
    <div id="contextMenu">
        <div onclick="editCurrentFriend()">Edit name</div>
        <div onclick="deleteCurrentFriend()">Delete friend</div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        let peer, currentChat;
        let onlineStatus = {};
        let lastSeen = {};
        let typingIndicators = {};
        let inputTypingTimeout = null;
        let db = JSON.parse(localStorage.getItem('zynq_chat_v1')) || { user: { id: '' }, friends: {}, pending: {} };
        let reconnectAttempts = {};
        let reconnectTimers = {};
        let retryInterval = null;
        let lastNetworkCheck = Date.now();
        let keepaliveInterval = null;
        let statusCheckerInterval = null;
        let chatMessagesDiv = null;
        let currentRenderedChat = null;
        let chatInitialized = false;
        let selectedFriendId = null;
        let peerRefreshTimer = null;
        let isChatTabActive = false;

        // === SUPER ROBUUST DELIVERY SYSTEEM (100% best-effort) ===
        const KEEPALIVE_INTERVAL = 2000;
        const STATUS_CHECK_INTERVAL = 1200;
        const OFFLINE_TIMEOUT = 15000;
        const RETRY_INTERVAL = 2200;
        const FAILURE_TIMEOUT_MS = 30 * 60 * 1000; // 30 minuten = markeren als "failed" (maar blijft automatisch retryen)
        const MAX_DELIVERY_ATTEMPTS = 999; // praktisch onbeperkt → "100% van de tijd" zolang peer online komt
        const EXTRA_RECONNECT_INTERVAL = 2500;
        const PEER_REFRESH_INTERVAL = 60000;

        function generateMsgId() {
            return 'msg-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 10);
        }

        function safeSend(to, payload) {
            if (!peer) return false;
            const isKeepalive = payload.type === 'keepalive';
            if (!isKeepalive && !onlineStatus[to]) return false;
            try {
                peer.send(to, payload);
                return true;
            } catch (e) {
                scheduleReconnect(to);
                return false;
            }
        }

        function markAsOffline(id) {
            let changed = false;
            if (onlineStatus[id] !== false) {
                onlineStatus[id] = false;
                changed = true;
            }
            if (db.pending && db.pending[id]) {
                db.pending[id].forEach(p => {
                    if (p.attempts !== 0) p.attempts = 0, changed = true;
                });
            }
            if (changed) {
                save();
                updateUIState();
                render();
            }
        }

        function flushPending(id) {
            if (!peer || !onlineStatus[id] || !db.pending[id] || db.pending[id].length === 0) return;
            const queue = db.pending[id];
            let changed = false;
            for (let i = 0; i < queue.length; i++) {
                const pmsg = queue[i];
                if (safeSend(id, { type: 'msg', mid: pmsg.mid, text: pmsg.text })) {
                    pmsg.attempts = (pmsg.attempts || 0) + 1;
                    changed = true;

                    // update bericht status naar 'sent' (als het nog pending was)
                    const friend = db.friends[id];
                    if (friend && friend.msgs) {
                        const msg = friend.msgs.find(m => m.f === 'me' && m.mid === pmsg.mid);
                        if (msg && (msg.status === 'pending' || !msg.status)) {
                            msg.status = 'sent';
                        }
                    }
                }
            }
            if (changed) {
                save();
                if (currentChat === id) renderMessages();
            }
        }

        function checkForFailedMessages(id) {
            if (!db.pending[id] || !db.friends[id]) return;
            const now = Date.now();
            let changed = false;

            db.pending[id].forEach(p => {
                const friend = db.friends[id];
                if (!friend || !friend.msgs) return;
                const msg = friend.msgs.find(m => m.f === 'me' && m.mid === p.mid);
                if (!msg) return;

                const attempts = p.attempts || 0;
                const timeSinceFirst = now - (p.firstAttempt || p.time || now);

                if (msg.status !== 'failed' && (attempts >= 50 || timeSinceFirst > FAILURE_TIMEOUT_MS)) {
                    msg.status = 'failed';
                    changed = true;
                }
            });

            if (changed) {
                save();
                if (currentChat === id) renderMessages();
            }
        }

        function startKeepAlive() {
            if (keepaliveInterval) clearInterval(keepaliveInterval);
            keepaliveInterval = setInterval(() => {
                if (!peer) return;
                Object.keys(db.friends).forEach(id => {
                    safeSend(id, { type: 'keepalive', ts: Date.now() });
                });
            }, KEEPALIVE_INTERVAL);
        }

        function startStatusChecker() {
            if (statusCheckerInterval) clearInterval(statusCheckerInterval);
            statusCheckerInterval = setInterval(() => {
                if (!peer) return;
                const now = Date.now();
                Object.keys(db.friends).forEach(id => {
                    if (onlineStatus[id] && lastSeen[id] && (now - lastSeen[id] > OFFLINE_TIMEOUT)) {
                        markAsOffline(id);
                        scheduleReconnect(id);
                    }
                });
            }, STATUS_CHECK_INTERVAL);
        }

        function startRetryInterval() {
            if (retryInterval) clearInterval(retryInterval);
            retryInterval = setInterval(() => {
                if (!peer) return;
                Object.keys(db.pending || {}).forEach(fid => {
                    if (onlineStatus[fid]) {
                        flushPending(fid);
                        checkForFailedMessages(fid);
                    }
                });
            }, RETRY_INTERVAL);
        }

        function scheduleReconnect(id) {
            if (reconnectTimers[id]) clearTimeout(reconnectTimers[id]);
            const attempts = reconnectAttempts[id] || 0;
            const delay = attempts === 0 ? 400 : Math.min(650 * Math.pow(1.6, attempts), 18000);
            reconnectTimers[id] = setTimeout(() => {
                delete reconnectTimers[id];
                if (!peer || onlineStatus[id] || !db.friends[id]) return;
                reconnectAttempts[id] = attempts + 1;
                try {
                    peer.connect(id);
                } catch (e) {
                    scheduleReconnect(id);
                }
            }, delay);
        }

        function resetReconnectState(id) {
            reconnectAttempts[id] = 0;
            if (reconnectTimers[id]) {
                clearTimeout(reconnectTimers[id]);
                delete reconnectTimers[id];
            }
        }

        function updateLastSeen(id) {
            lastSeen[id] = Date.now();
            if (!onlineStatus[id]) {
                onlineStatus[id] = true;
                resetReconnectState(id);
                updateUIState();
                render();
            }
        }

        function handleTyping(from, status) {
            if (status) {
                if (typingIndicators[from]) clearTimeout(typingIndicators[from]);
                typingIndicators[from] = setTimeout(() => {
                    delete typingIndicators[from];
                    if (currentChat === from) renderMessages();
                }, 4500);
                if (currentChat === from) renderMessages();
            } else {
                if (typingIndicators[from]) {
                    clearTimeout(typingIndicators[from]);
                    delete typingIndicators[from];
                }
                if (currentChat === from) renderMessages();
            }
        }

        function setupTypingListener() {
            const inp = document.getElementById('msgInp');
            if (!inp) return;
            inp.addEventListener('input', () => {
                if (!currentChat || !onlineStatus[currentChat] || !peer) return;
                safeSend(currentChat, { type: 'typing', status: true });
                clearTimeout(inputTypingTimeout);
                inputTypingTimeout = setTimeout(() => {
                    if (peer && currentChat) safeSend(currentChat, { type: 'typing', status: false });
                }, 2800);
            });
        }

        function checkAllStatuses() {
            if (!peer) return;
            Object.keys(db.friends).forEach(id => {
                if (!onlineStatus[id]) {
                    try {
                        peer.connect(id);
                    } catch (e) {}
                }
            });
        }

        function showHomeScreen() {
            const home = document.getElementById('homeScreen');
            const wrapper = document.getElementById('messagesWrapper');
            if (home) home.style.display = 'flex';
            if (wrapper) wrapper.style.display = 'none';
            chatInitialized = false;
            currentRenderedChat = null;
            if (chatMessagesDiv && chatMessagesDiv.parentNode) chatMessagesDiv.parentNode.removeChild(chatMessagesDiv);
            chatMessagesDiv = null;
        }

        function renderMessages() {
            const home = document.getElementById('homeScreen');
            const wrapper = document.getElementById('messagesWrapper');
            if (home) home.style.display = 'none';
            if (wrapper) wrapper.style.display = 'flex';
            if (!currentChat || !db.friends[currentChat]) return;

            const friend = db.friends[currentChat];
            const firstLetter = friend.alias.charAt(0).toUpperCase();
            const isTypingNow = !!typingIndicators[currentChat];

            if (!chatInitialized) {
                wrapper.innerHTML = '';
                chatMessagesDiv = document.createElement('div');
                chatMessagesDiv.style.cssText = 'flex:1;overflow-y:auto;padding:28px 30px;display:flex;flex-direction:column;gap:18px;background:var(--card-bg);scroll-behavior:smooth';
                wrapper.appendChild(chatMessagesDiv);
                chatInitialized = true;
            }

            // ALTIJD volledig herbouwen → status updates (queued / failed / delivered) worden direct zichtbaar
            chatMessagesDiv.innerHTML = '';

            friend.msgs.forEach(m => {
                const isMe = m.f === 'me';
                if (isMe && typeof m.status === 'undefined') m.status = 'delivered';

                const row = document.createElement('div');
                row.className = `message-row ${isMe ? 'me' : 'other'}`;

                if (!isMe) {
                    const av = document.createElement('div');
                    av.className = 'avatar-chat';
                    av.textContent = firstLetter;
                    row.appendChild(av);
                }

                const content = document.createElement('div');
                content.className = 'message-content';

                const bubble = document.createElement('div');
                bubble.className = `bubble ${isMe ? 'me' : 'other'}`;
                bubble.textContent = m.t;
                content.appendChild(bubble);

                // tijd
                const ts = document.createElement('div');
                ts.className = 'timestamp';
                const timeSpan = document.createElement('span');
                timeSpan.textContent = formatTime(m.time);
                ts.appendChild(timeSpan);
                content.appendChild(ts);

                // === STATUS INDIKATOR (queued / sent / delivered / failed) ===
                if (isMe) {
                    const statusDiv = document.createElement('div');
                    statusDiv.className = 'message-status';
                    let statusHTML = '';

                    switch (m.status) {
                        case 'pending':
                            statusHTML = `<span style="color:#64748b;">● queued</span>`;
                            break;
                        case 'sent':
                            statusHTML = `<span style="color:#64748b;">✓ sent</span>`;
                            break;
                        case 'delivered':
                            statusHTML = `<span style="color:var(--success);">✓✓ delivered</span>`;
                            break;
                        case 'failed':
                            statusHTML = `<span style="color:var(--danger);">✕ delivery failed <span onclick="event.stopImmediatePropagation();retryMessage('${currentChat}','${m.mid}');" style="text-decoration:underline;cursor:pointer;font-weight:700;">retry now</span></span>`;
                            break;
                    }
                    statusDiv.innerHTML = statusHTML;
                    content.appendChild(statusDiv);
                }

                row.appendChild(content);
                chatMessagesDiv.appendChild(row);
            });

            // typing indicator
            if (isTypingNow) {
                const row = document.createElement('div');
                row.id = 'typing-indicator';
                row.className = 'message-row other';
                row.innerHTML = `<div class="avatar-chat">${firstLetter}</div><div class="message-content"><div class="bubble other typing-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
                chatMessagesDiv.appendChild(row);
            }

            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
            currentRenderedChat = currentChat;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
        }

        function retryMessage(chatId, mid) {
            if (!db.friends[chatId] || !db.pending[chatId]) return;
            const pmsg = db.pending[chatId].find(p => p.mid === mid);
            if (!pmsg) return;

            pmsg.attempts = 0;
            pmsg.firstAttempt = Date.now();

            const friend = db.friends[chatId];
            const msg = friend.msgs.find(m => m.f === 'me' && m.mid === mid);
            if (msg) msg.status = 'pending';

            save();

            if (onlineStatus[chatId] && peer) {
                flushPending(chatId);
            }

            if (currentChat === chatId) renderMessages();

            showToast('🔄 Retrying message...', 2200);
        }

        function showToast(text, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.style.display = 'flex';
            setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        window.onload = () => init();

        function init() {
            if (!db.pending) db.pending = {};
            if (!db.user.id) {
                db.user.id = 'ZNQ-' + Math.random().toString(36).substring(2, 8).toUpperCase();
                save();
            }
            document.getElementById('myId').textContent = db.user.id;

            // === MIGRATIE oude berichten (backward compatible) ===
            if (db.friends) {
                Object.keys(db.friends).forEach(key => {
                    const f = db.friends[key];
                    if (f.msgs) {
                        f.msgs.forEach(msg => {
                            if (msg.f === 'me' && typeof msg.status === 'undefined') {
                                msg.status = 'delivered';
                            }
                        });
                    }
                    if (db.pending && db.pending[key]) {
                        db.pending[key].forEach(p => {
                            if (!p.firstAttempt) p.firstAttempt = p.time || Date.now();
                        });
                    }
                });
                save();
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && currentChat !== null) {
                    currentChat = null;
                    showHomeScreen();
                    updateUIState();
                    render();
                }
            });

            peer = new ZYNQ.Peer({ id: db.user.id, txt: true, video: false, audio: false });

            peer.on('ready', (id) => {
                document.getElementById('myId').textContent = id;
                checkAllStatuses();
                startKeepAlive();
                startStatusChecker();
                startRetryInterval();

                setInterval(() => {
                    if (!peer) return;
                    Object.keys(db.friends).forEach(id => {
                        if (!onlineStatus[id]) {
                            try { peer.connect(id); } catch (e) {}
                        } else {
                            safeSend(id, { type: 'keepalive', ts: Date.now() });
                        }
                    });
                }, EXTRA_RECONNECT_INTERVAL);

                if (!peerRefreshTimer) {
                    peerRefreshTimer = setInterval(() => {
                        if (!peer) return;
                        console.log('%c🔄 [ZYNQ] FULL PEER RECONNECT CYCLE (NAT protection)', 'color:#6366f1; font-weight:700; background:#0d0d12; padding:2px 6px; border-radius:4px;');
                        Object.keys(db.friends).forEach(id => {
                            if (peer) {
                                try { peer.connect(id); } catch (e) {}
                                if (onlineStatus[id]) flushPending(id);
                            }
                        });
                        checkAllStatuses();
                    }, PEER_REFRESH_INTERVAL);
                }

                Object.keys(db.pending).forEach(fid => {
                    if (onlineStatus[fid]) flushPending(fid);
                });
            });

            peer.on('message', (payload) => {
                const data = payload.data;
                const from = payload.from;
                if (!data) return;

                updateLastSeen(from);

                if (data.type === 'msg' || !data.type) {
                    const msgText = data.text || (typeof data === 'string' ? data : '');
                    const msgMid = data.mid || null;
                    const msgTime = Date.now();

                    if (!db.friends[from]) db.friends[from] = { alias: generateRandomName(), msgs: [], unread: 0 };

                    if (msgMid) {
                        const alreadyReceived = db.friends[from].msgs.some(m => m.mid === msgMid && m.f !== 'me');
                        if (alreadyReceived) {
                            safeSend(from, { type: 'ack', mid: msgMid });
                            save();
                            return;
                        }
                    }

                    db.friends[from].msgs.push({ f: from, t: msgText, time: msgTime, mid: msgMid });

                    const isCurrentAndActiveTab = (currentChat === from) && isChatTabActive;
                    let unreadCount = db.friends[from].unread || 0;

                    if (!isCurrentAndActiveTab) {
                        unreadCount += 1;
                        db.friends[from].unread = unreadCount;
                    }

                    emitToParent('received', { 
                        chatId: from, 
                        from: from, 
                        to: db.user.id, 
                        text: msgText, 
                        mid: msgMid, 
                        time: msgTime, 
                        unread: unreadCount 
                    });

                    if (isCurrentAndActiveTab) {
                        emitToParent('read', { 
                            type: 'messageRead', 
                            chatId: from, 
                            mid: msgMid, 
                            timestamp: msgTime 
                        });
                    }

                    save();
                    if (currentChat === from) renderMessages();
                    render();
                    safeSend(from, { type: 'ack', mid: msgMid });
                } 
                else if (data.type === 'ack') {
                    const mid = data.mid;
                    if (mid && db.pending[from]) {
                        db.pending[from] = db.pending[from].filter(p => p.mid !== mid);
                        const msgs = db.friends[from] ? db.friends[from].msgs : [];
                        const sentMsg = msgs.find(m => m.f === 'me' && m.mid === mid);
                        if (sentMsg) sentMsg.status = 'delivered';
                        save();
                        if (currentChat === from) renderMessages();
                    }
                } 
                else if (data.type === 'typing') {
                    handleTyping(from, data.status);
                } 
                else if (data.type === 'keepalive') {
                    safeSend(from, { type: 'keepalive', ts: Date.now() });
                }
            });

            peer.on('open', (id) => {
                onlineStatus[id] = true;
                updateLastSeen(id);
                flushPending(id);
                updateUIState();
                render();
            });

            peer.on('close', ({ id }) => {
                markAsOffline(id);
                if (db.friends[id]) scheduleReconnect(id);
            });

            peer.on('error', () => {});

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && peer) {
                    checkAllStatuses();
                    Object.keys(db.friends).forEach(id => safeSend(id, { type: 'keepalive', ts: Date.now() }));
                }
            });

            window.addEventListener('online', () => {
                if (Date.now() - lastNetworkCheck > 1000) {
                    lastNetworkCheck = Date.now();
                    if (peer) checkAllStatuses();
                }
            });

            document.getElementById('menuBtn').addEventListener('click', toggleMenu);
            setupTypingListener();

            window.addEventListener('message', (e) => {
                if (e.source === window.parent && e.data && e.data.type === 'zynq_tab_status') {
                    const previouslyActive = isChatTabActive;
                    isChatTabActive = Boolean(e.data.active);

                    if (isChatTabActive && !previouslyActive && currentChat && db.friends[currentChat]) {
                        const friend = db.friends[currentChat];
                        if (friend.unread > 0) {
                            friend.unread = 0;
                            emitToParent('read', { 
                                type: 'allMessagesRead', 
                                chatId: currentChat, 
                                timestamp: Date.now(), 
                                unreadCleared: true 
                            });
                            save();
                            render();
                        }
                    }
                }
            });

            document.addEventListener('click', (e) => {
                const menu = document.getElementById('contextMenu');
                if (menu && menu.style.display === 'block' && !menu.contains(e.target)) closeContextMenu();
            });

            render();
            updateUIState();
            showHomeScreen();
        }

        function emitToParent(subType, payload) {
            if (window.parent && typeof window.parent.postMessage === 'function') {
                window.parent.postMessage({ 
                    type: "zynq_message", 
                    subType: subType, 
                    timestamp: Date.now(), 
                    userId: db.user.id, 
                    ...payload 
                }, "*");
            }
        }

        function updateUIState() {
            const inpBar = document.querySelector('.input-bar');
            const title = document.getElementById('chatTitle');
            const indicator = document.getElementById('onlineIndicator');
            const inp = document.getElementById('msgInp');
            const btn = document.getElementById('sendBtn');
            if (!currentChat) {
                title.textContent = '';
                indicator.style.display = 'none';
                inpBar.style.display = 'none';
                return;
            }
            const friend = db.friends[currentChat];
            title.textContent = friend.alias;
            indicator.style.display = 'flex';
            const isOnline = onlineStatus[currentChat] || false;
            indicator.innerHTML = isOnline ? `<span style="color: var(--success); font-size: 18px;">●</span> ONLINE` : `<span style="color: var(--danger); font-size: 18px;">●</span> OFFLINE`;
            if (isOnline) {
                inp.disabled = false;
                btn.disabled = false;
                inp.placeholder = "Type your message here...";
            } else {
                inp.disabled = true;
                btn.disabled = true;
                inp.placeholder = "User offline — message will be queued and sent automatically when possible";
            }
            inpBar.style.display = 'flex';
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = "Add Friend";
            document.getElementById('fId').value = "";
            document.getElementById('fId').disabled = false;
            document.getElementById('fAlias').value = "";
            document.getElementById('friendModal').style.display = 'flex';
        }

        function openEditModal(e, id) {
            if (e && typeof e.stopPropagation === 'function') e.stopPropagation();
            document.getElementById('modalTitle').textContent = "Edit Name";
            document.getElementById('fId').value = id;
            document.getElementById('fId').disabled = true;
            document.getElementById('fAlias').value = db.friends[id].alias;
            document.getElementById('friendModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('friendModal').style.display = 'none';
        }

        function saveFriend() {
            const id = document.getElementById('fId').value.trim().toUpperCase();
            let alias = document.getElementById('fAlias').value.trim() || generateRandomName();
            if (id) {
                if (!db.friends[id]) db.friends[id] = { alias: alias, msgs: [], unread: 0 };
                else db.friends[id].alias = alias;
                if (peer) peer.connect(id);
                save();
                render();
                closeModal();
                if (id === currentChat) updateUIState();
            }
        }

        function send() {
            const inp = document.getElementById('msgInp');
            const text = inp.value.trim();
            if (!text || !currentChat || !peer) return;

            const mid = generateMsgId();
            const msgTime = Date.now();

            if (!db.friends[currentChat].msgs) db.friends[currentChat].msgs = [];

            db.friends[currentChat].msgs.push({ 
                f: 'me', 
                t: text, 
                time: msgTime, 
                mid: mid, 
                status: 'pending' 
            });

            emitToParent('sent', { 
                chatId: currentChat, 
                from: db.user.id, 
                to: currentChat, 
                text: text, 
                mid: mid, 
                time: msgTime 
            });

            if (!db.pending[currentChat]) db.pending[currentChat] = [];
            db.pending[currentChat].push({ 
                mid: mid, 
                text: text, 
                time: msgTime, 
                attempts: 0, 
                firstAttempt: msgTime 
            });

            save();
            renderMessages();
            inp.value = '';

            if (onlineStatus[currentChat] && peer) {
                if (safeSend(currentChat, { type: 'msg', mid: mid, text: text })) {
                    const last = db.pending[currentChat][db.pending[currentChat].length - 1];
                    if (last) last.attempts = 1;
                    save();
                }
            }

            if (inputTypingTimeout) {
                clearTimeout(inputTypingTimeout);
                if (peer && currentChat) safeSend(currentChat, { type: 'typing', status: false });
                inputTypingTimeout = null;
            }
        }

        function render() {
            const fList = document.getElementById('friendsList');
            fList.innerHTML = '';
            Object.keys(db.friends).forEach(id => {
                const friend = db.friends[id];
                const isOnline = onlineStatus[id] || false;
                const div = document.createElement('div');
                div.className = `friend-row ${currentChat === id ? 'active' : ''}`;
                const firstLetter = friend.alias.charAt(0).toUpperCase();
                div.innerHTML = ` 
                    <div class="avatar-container">
                        <div class="avatar">${firstLetter}</div>
                        <div class="status-dot ${isOnline ? 'online' : ''}"></div>
                    </div>
                    <div class="friend-info">
                        <div class="friend-name-container">
                            <div class="friend-name">${friend.alias}</div>
                            ${friend.unread > 0 ? `<div class="unread-pill">${friend.unread}</div>` : ''}
                        </div>
                        <div class="friend-id">${id}</div>
                    </div>
                    <button class="menu-btn" onclick="showContextMenu(event, '${id}')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="1.2"></circle>
                            <circle cx="12" cy="12" r="1.2"></circle>
                            <circle cx="12" cy="19" r="1.2"></circle>
                        </svg>
                    </button> 
                `;
                div.onclick = () => {
                    currentChat = id;
                    if (isChatTabActive) {
                        db.friends[id].unread = 0;
                        emitToParent('read', { 
                            type: 'allMessagesRead', 
                            chatId: id, 
                            timestamp: Date.now(), 
                            unreadCleared: true 
                        });
                    }
                    save();
                    updateUIState();
                    renderMessages();
                    render();
                    if (window.innerWidth <= 768) toggleMenu();
                };

                let touchTimer;
                div.addEventListener('touchstart', () => { touchTimer = setTimeout(() => longPressDelete(id), 700); });
                div.addEventListener('touchend', () => { if (touchTimer) clearTimeout(touchTimer); });
                div.addEventListener('touchmove', () => { if (touchTimer) clearTimeout(touchTimer); });
                div.addEventListener('touchcancel', () => { if (touchTimer) clearTimeout(touchTimer); });

                fList.appendChild(div);
            });

            if (Object.keys(db.friends).length === 0) {
                fList.innerHTML = `<div style="padding: 40px 20px; text-align:center; color:var(--muted); font-size:14px;">No friends added yet.<br>Click the + to add someone.</div>`;
            }
        }

        function generateRandomName() {
            return "User" + Math.floor(1000 + Math.random() * 8999);
        }

        function save() {
            localStorage.setItem('zynq_chat_v1', JSON.stringify(db));
        }

        function copyId() {
            navigator.clipboard.writeText(db.user.id).then(() => {
                const original = document.getElementById('myId').textContent;
                document.getElementById('myId').textContent = "Copied!";
                setTimeout(() => document.getElementById('myId').textContent = original, 1200);
            });
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('menuBtn');
            sidebar.classList.toggle('open');
            btn.classList.toggle('open');
            if (sidebar.classList.contains('open')) {
                overlay.style.display = 'block';
                overlay.style.pointerEvents = 'all';
                overlay.style.opacity = '1';
            } else {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.style.pointerEvents = 'none';
                }, 400);
            }
        }

        function showContextMenu(e, id) {
            e.stopPropagation();
            selectedFriendId = id;
            const menu = document.getElementById('contextMenu');
            menu.style.display = 'block';
            const rect = e.currentTarget.getBoundingClientRect();
            let topPos = rect.bottom + window.scrollY + 4;
            let leftPos = rect.left + window.scrollX - 20;
            if (leftPos + 170 > window.innerWidth) leftPos = window.innerWidth - 180;
            menu.style.top = `${topPos}px`;
            menu.style.left = `${leftPos}px`;
        }

        function closeContextMenu() {
            const menu = document.getElementById('contextMenu');
            menu.style.display = 'none';
            selectedFriendId = null;
        }

        function editCurrentFriend() {
            if (selectedFriendId) {
                const id = selectedFriendId;
                closeContextMenu();
                openEditModal(null, id);
            }
        }

        function deleteCurrentFriend() {
            if (selectedFriendId) {
                const id = selectedFriendId;
                closeContextMenu();
                const friend = db.friends[id];
                if (friend && confirm(`Delete ${friend.alias} and all messages?\n\nThis cannot be undone.`)) performDelete(id);
            }
        }

        function longPressDelete(id) {
            const friend = db.friends[id];
            if (!friend) return;
            if (confirm(`Delete ${friend.alias} and all messages?\n\nThis cannot be undone.`)) performDelete(id);
        }

        function performDelete(id) {
            if (currentChat === id) {
                currentChat = null;
                showHomeScreen();
                updateUIState();
            }
            if (db.friends[id]) delete db.friends[id];
            if (onlineStatus[id] !== undefined) delete onlineStatus[id];
            if (lastSeen[id] !== undefined) delete lastSeen[id];
            if (db.pending && db.pending[id] !== undefined) delete db.pending[id];
            if (peer) {
                try {
                    peer.disconnect ? peer.disconnect(id) : peer.close && peer.close(id);
                } catch (e) {}
            }
            save();
            render();
        }

        function showHelpModal() {
            document.getElementById('helpModal').style.display = 'flex';
        }

        function closeHelpModal() {
            document.getElementById('helpModal').style.display = 'none';
        }
    </script>

    <script>
        (function () {
            function countUnread() {
                return Object.values(db.friends || {}).reduce((a, f) => a + (f.unread || 0), 0);
            }
            function emit() {
                window.parent?.postMessage({ 
                    type: "zynq_state", 
                    hasUnread: countUnread() > 0, 
                    unread: countUnread(), 
                    inChat: !!currentChat, 
                    timestamp: Date.now() 
                }, "*");
            }
            function push() {
                setTimeout(emit, 0);
            }
            const oldSend = window.send;
            window.send = function () {
                oldSend?.apply(this, arguments);
                push();
            };
            const oldRender = window.render;
            window.render = function () {
                oldRender?.apply(this, arguments);
                push();
            };
            const oldRM = window.renderMessages;
            window.renderMessages = function () {
                oldRM?.apply(this, arguments);
                push();
            };
            document.addEventListener("visibilitychange", push);
            window.addEventListener("load", () => setTimeout(push, 200));
        })();
    </script>
</body>
</html>
